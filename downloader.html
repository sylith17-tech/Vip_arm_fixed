<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel-0x0 | Media Intelligence Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --down-bg: #05010a;
            --neon-purple: #bc13fe;
            --neon-green: #00ff41;
            --deep-violet: #1a052e;
            --text-dim: #94a3b8;
            --success: #00f2ff;
            --danger: #ff3e3e;
            --panel-border: #1e1b26;
            --card-bg: rgba(13, 11, 18, 0.95);
        }

        body {
            background-color: var(--down-bg);
            color: #f8fafc;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar System */
        .sidebar {
            width: 70px;
            background: #000;
            border-left: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100%;
            right: 0;
            z-index: 1000;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar:hover { width: 240px; }
        .sidebar a {
            padding: 18px 22px;
            color: #475569;
            text-decoration: none;
            display: flex;
            align-items: center;
            white-space: nowrap;
            transition: 0.3s;
        }
        .sidebar a span { display: none; margin-right: 15px; font-size: 14px; }
        .sidebar:hover a span { display: block; }
        .sidebar a:hover, .sidebar a.active {
            color: var(--neon-purple);
            background: rgba(188, 19, 254, 0.05);
            border-right: 4px solid var(--neon-purple);
        }

        /* Main Engine Canvas */
        .main-engine {
            margin-right: 70px;
            flex: 1;
            padding: 40px;
            background: radial-gradient(circle at 10% 20%, rgba(26, 5, 46, 0.2) 0%, rgba(5, 1, 10, 1) 90%);
            transition: 0.3s;
        }

        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-family: 'Share Tech Mono'; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; font-size: 2.5rem; color: #fff; }
        .platform-icons { display: flex; justify-content: center; gap: 20px; margin-top: 20px; color: #475569; font-size: 24px; }
        .platform-icons i:hover { color: var(--neon-purple); transform: translateY(-5px); transition: 0.3s; }

        /* Input Terminal Area */
        .search-container {
            max-width: 850px;
            margin: 0 auto;
            position: relative;
            background: var(--card-bg);
            padding: 5px;
            border-radius: 15px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        input[type="url"] {
            width: 100%;
            padding: 20px 25px;
            background: transparent;
            border: none;
            color: var(--neon-green);
            font-size: 16px;
            outline: none;
            padding-left: 160px;
            font-family: 'Share Tech Mono', monospace;
        }

        .btn-extract {
            position: absolute;
            left: 10px; top: 10px; bottom: 10px;
            background: linear-gradient(45deg, var(--neon-purple), #6b21a8);
            color: #fff;
            border: none;
            padding: 0 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(188, 19, 254, 0.3);
        }
        .btn-extract:hover { transform: translateY(-2px); filter: brightness(1.2); box-shadow: 0 6px 20px rgba(188, 19, 254, 0.5); }
        .btn-extract:disabled { background: #334155; cursor: not-allowed; transform: none; }

        /* Console Feed */
        .console-feed {
            max-width: 850px;
            margin: 20px auto;
            background: #000;
            border: 1px solid #1e1b26;
            border-radius: 8px;
            padding: 12px 20px;
            font-family: 'Share Tech Mono';
            font-size: 12px;
            color: var(--neon-green);
            min-height: 45px;
            display: none;
            box-shadow: inset 0 0 10px rgba(0,255,65,0.1);
        }

        /* Results Matrix */
        .results-panel {
            max-width: 900px;
            margin: 40px auto;
            background: var(--card-bg);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            overflow: hidden;
            display: none;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .media-header {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 0;
        }

        .preview-zone {
            background: #000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .thumb-preview {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(188, 19, 254, 0.3);
            transition: 0.5s;
        }

        .info-zone {
            padding: 40px;
            border-right: 1px solid var(--panel-border);
        }

        /* Action Buttons */
        .action-hub {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-direct-download {
            flex: 1;
            background: var(--neon-green);
            color: #000;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
        }
        .btn-direct-download:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(0, 255, 65, 0.4); }

        .cloud-btn {
            width: 55px;
            background: rgba(0, 136, 204, 0.1);
            color: #0088cc;
            border: 1px solid #0088cc;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            transition: 0.3s;
        }
        .cloud-btn:hover { background: #0088cc; color: #fff; }

        /* Format Table */
        .format-table {
            width: 100%;
            margin-top: 25px;
            border-collapse: separate;
            border-spacing: 0 8px;
        }
        .format-table tr { background: rgba(255,255,255,0.02); }
        .format-table td { padding: 12px 15px; font-size: 13px; border-top: 1px solid var(--panel-border); border-bottom: 1px solid var(--panel-border); }
        .format-table td:first-child { border-radius: 8px 0 0 8px; border-left: 1px solid var(--panel-border); }
        .format-table td:last-child { border-radius: 0 8px 8px 0; border-right: 1px solid var(--panel-border); }

        .badge {
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-video { background: rgba(0, 242, 255, 0.1); color: var(--success); border: 1px solid var(--success); }
        .badge-audio { background: rgba(188, 19, 254, 0.1); color: var(--neon-purple); border: 1px solid var(--neon-purple); }

        .dl-icon-btn {
            background: var(--neon-purple);
            color: #fff;
            padding: 6px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            transition: 0.2s;
            cursor: pointer;
            display: inline-block;
        }
        .dl-icon-btn:hover { filter: brightness(1.3); transform: scale(1.1); }

        @media (max-width: 768px) {
            .main-engine { margin-right: 0; padding: 20px; }
            .media-header { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .info-zone { padding: 25px; border-right: none; border-top: 1px solid var(--panel-border); }
            input[type="url"] { padding-left: 20px; padding-top: 70px; }
            .btn-extract { width: 94%; left: 3%; top: 10px; height: 50px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div style="padding: 30px 0; text-align: center;">
            <i class="fas fa-biohazard" style="font-size: 28px; color: var(--neon-purple);"></i>
        </div>
        <a href="index.html"><i class="fas fa-columns"></i> <span>DASHBOARD</span></a>
        <a href="downloader.html" class="active"><i class="fas fa-download"></i> <span>MEDIA EXTRACTOR</span></a>
        <a href="scanner.html"><i class="fas fa-user-shield"></i> <span>SECURITY AUDIT</span></a>
        <a href="exif.html"><i class="fas fa-search-plus"></i> <span>FORENSIC LAB</span></a>
        <a href="editor.html"><i class="fas fa-code"></i> <span>NEURAL EDITOR</span></a>
    </nav>

    <main class="main-engine">
        <div class="hero">
            <i class="fas fa-bolt" style="font-size: 50px; color: var(--neon-purple); text-shadow: 0 0 20px var(--neon-purple);"></i>
            <h1>Intelligence Engine</h1>
            <p style="color: var(--text-dim); margin-top: 10px;">نظام اعتراض وتحليل وسائط التواصل الاجتماعي - Kernel-0x0</p>
            <div class="platform-icons">
                <i class="fab fa-youtube"></i>
                <i class="fab fa-tiktok"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-facebook"></i>
                <i class="fab fa-x-twitter"></i>
                <i class="fas fa-link"></i>
            </div>
        </div>

        <div class="search-container">
            <input type="url" id="targetUrl" placeholder="PASTE TARGET URL HERE (MP4, YT, IG, FB)...">
            <button class="btn-extract" id="extractBtn" onclick="processExtraction()">Analyze Link</button>
        </div>

        <div id="consoleFeed" class="console-feed"></div>

        <div id="loader" style="display: none; text-align: center; margin: 40px;">
            <i class="fas fa-circle-notch fa-spin" style="font-size: 50px; color: var(--neon-purple);"></i>
            <p style="margin-top: 20px; font-family: 'Share Tech Mono'; color: var(--neon-purple); letter-spacing: 2px;">INTERCEPTING DATA STREAMS...</p>
        </div>

        <div class="results-panel" id="results">
            <div class="media-header">
                <div class="preview-zone">
                    <img src="" id="resThumb" class="thumb-preview">
                    <div class="action-hub">
                        <button id="mainDownloadBtn" class="btn-direct-download">
                            <i class="fas fa-file-download"></i> <span id="mainBtnText">تحميل مباشر</span>
                        </button>
                        <button class="cloud-btn" id="mastermindSync" title="Sync to VIP_ARM OS" onclick="sendToCloud()">
                            <i class="fab fa-telegram-plane"></i>
                        </button>
                    </div>
                </div>
                <div class="info-zone">
                    <h2 id="resTitle" style="margin: 0; font-size: 22px; color: #fff;">Video Title</h2>
                    <p id="resAuthor" style="color: var(--neon-purple); font-family: 'Share Tech Mono'; margin: 10px 0;">SOURCE: UNKNOWN</p>

                    <div style="margin: 25px 0; display: flex; gap: 12px;">
                        <span id="resDuration" class="badge" style="background: rgba(255,255,255,0.05); color: #fff;">00:00</span>
                        <span id="resPlatform" class="badge" style="background: rgba(255,255,255,0.05); color: var(--neon-green);">LIVE FEED</span>
                    </div>

                    <div style="overflow-x: auto;">
                        <table class="format-table">
                            <thead>
                                <tr style="color: var(--text-dim); font-size: 11px; text-align: right; opacity: 0.6;">
                                    <th>TYPE</th>
                                    <th>QUALITY</th>
                                    <th>SIZE</th>
                                    <th>ACTION</th>
                                </tr>
                            </thead>
                            <tbody id="formatList"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const logs = [
            "ESTABLISHING HANDSHAKE...",
            "SPOOFING USER-AGENT...",
            "DECODING STREAM MANIFEST...",
            "BYPASSING PAYWALLS...",
            "SUCCESS: DATA EXTRACTED."
        ];

        // --- الميزة الجديدة: وظيفة التحميل القسري الذكي ---
        async function triggerDirectDownload(url, filename, btnElement) {
            const originalContent = btnElement.innerHTML;
            
            try {
                // تحديث الحالة بصرياً
                btnElement.style.opacity = "0.7";
                btnElement.innerHTML = '<i class="fas fa-cog fa-spin"></i> جاري التحضير...';
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('Download failed');
                
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const tempAnchor = document.createElement('a');
                tempAnchor.style.display = 'none';
                tempAnchor.href = blobUrl;
                tempAnchor.download = filename || 'Kernel_Captured_Media.mp4';
                
                document.body.appendChild(tempAnchor);
                tempAnchor.click();
                
                // تنظيف
                setTimeout(() => {
                    window.URL.revokeObjectURL(blobUrl);
                    document.body.removeChild(tempAnchor);
                    btnElement.innerHTML = originalContent;
                    btnElement.style.opacity = "1";
                }, 100);

            } catch (error) {
                console.error("Direct download intercepted by CORS or Network issue:", error);
                // Fallback: إذا فشل الـ Blob (بسبب CORS)، نفتح الرابط في تبويب جديد كحل أخير
                window.open(url, '_blank');
                btnElement.innerHTML = originalContent;
                btnElement.style.opacity = "1";
            }
        }

        async function processExtraction() {
            const url = document.getElementById('targetUrl').value;
            if(!url) return;

            const consoleBox = document.getElementById('consoleFeed');
            consoleBox.style.display = 'block';
            consoleBox.innerHTML = '';
            document.getElementById('results').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            const btn = document.getElementById('extractBtn');
            btn.disabled = true;

            let logIndex = 0;
            const logInterval = setInterval(() => {
                if(logIndex < logs.length) {
                    consoleBox.innerHTML = `<span style="color: #666;">[${new Date().toLocaleTimeString()}]</span> > ${logs[logIndex]}`;
                    logIndex++;
                } else {
                    clearInterval(logInterval);
                }
            }, 400);

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if(data.status === 'success') {
                    displayResults(data);
                } else {
                    alert("Analysis Failed: " + data.message);
                }
            } catch (e) {
                alert("Critical Error: Connection to Kernel-0x0 Backend Lost.");
            } finally {
                document.getElementById('loader').style.display = 'none';
                btn.disabled = false;
            }
        }

        function displayResults(data) {
            const panel = document.getElementById('results');
            panel.style.display = 'block';

            document.getElementById('resTitle').innerText = data.title;
            document.getElementById('resThumb').src = data.thumbnail;
            document.getElementById('resAuthor').innerText = `SOURCE: ${data.uploader || 'External Stream'}`;
            document.getElementById('resDuration').innerText = data.duration_string || '--:--';

            // تصفية الجودات المتاحة
            const videoFormats = data.formats.filter(f => f.vcodec !== 'none' && f.ext === 'mp4').sort((a, b) => (b.height || 0) - (a.height || 0));

            const mainBtn = document.getElementById('mainDownloadBtn');
            if(videoFormats.length > 0) {
                // ربط الزر الرئيسي بأعلى جودة باستخدام الوظيفة الجديدة
                mainBtn.onclick = () => triggerDirectDownload(videoFormats[0].url, `${data.title}.mp4`, mainBtn);
            }

            const list = document.getElementById('formatList');
            list.innerHTML = '';

            data.formats.forEach(f => {
                const isAudio = f.vcodec === 'none';
                const tr = document.createElement('tr');

                tr.innerHTML = `
                    <td><span class="badge ${isAudio ? 'badge-audio' : 'badge-video'}">${f.ext}</span></td>
                    <td style="font-family: 'Share Tech Mono'; color: #fff;">${f.resolution || 'AUDIO'}</td>
                    <td style="color: var(--text-dim);">${f.filesize_approx || f.filesize || 'Auto'}</td>
                    <td>
                        <button onclick="triggerDirectDownload('${f.url}', '${data.title}.${f.ext}', this)" class="dl-icon-btn">GET</button>
                    </td>
                `;
                list.appendChild(tr);
            });

            panel.scrollIntoView({ behavior: 'smooth' });
        }

        function sendToCloud() {
            const url = document.getElementById('targetUrl').value;
            alert("Uplinking to VIP_ARM OS... Check your Telegram for the file.");
            fetch('/api/telegram_sync', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ media_url: url })
            });
        }
    </script>
</body>
</html>
