<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP_ARM Studio PRO | Kernel-0x0</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=JetBrains+Mono:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2ff;
            --primary-glow: rgba(0, 242, 255, 0.5);
            --secondary: #7000ff;
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --border: rgba(0, 242, 255, 0.2);
            --text-main: #f8fafc;
            --accent: #ff0055;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.1) 0%, transparent 50%),
                linear-gradient(rgba(0, 242, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 20px 20px, 20px 20px;
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
        }

        /* Top Navigation */
        .studio-nav {
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(15px);
            padding: 10px 30px;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.5rem;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Main Layout */
        .main-wrapper {
            display: grid;
            grid-template-columns: 380px 1fr 300px;
            gap: 15px;
            padding: 15px;
            height: calc(100vh - 70px);
        }

        /* Sidebar Panels */
        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 12px 20px;
            background: rgba(0, 242, 255, 0.05);
            border-bottom: 1px solid var(--border);
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-content {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        /* Interaction Elements */
        .control-item { margin-bottom: 18px; }
        .control-item label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 8px;
            color: #94a3b8;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            height: 4px;
            cursor: pointer;
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Cairo';
            font-size: 0.85rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .action-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary-glow);
            transform: translateY(-2px);
        }

        .action-btn.special {
            background: linear-gradient(45deg, var(--secondary), #bc00ff);
            border: none;
        }

        /* Canvas Area */
        .viewport {
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        #mainCanvas {
            max-width: 95%;
            max-height: 95%;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            display: none;
        }

        /* Floating Terminal */
        .terminal-box {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'JetBrains Mono';
            font-size: 0.7rem;
            height: 100px;
            overflow-y: auto;
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .main-wrapper { grid-template-columns: 1fr; height: auto; }
            .panel { min-height: 400px; }
            .viewport { height: 500px; }
        }

        /* Loading Animation */
        .loader-ring {
            width: 80px;
            height: 80px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav class="studio-nav">
    <div class="brand">
        <a href="/" style="color: var(--primary); text-decoration: none;"><i class="fas fa-microchip"></i></a>
        <span>KERNEL_0x0 // STUDIO v2.5</span>
    </div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <span id="statusNode" style="color: var(--primary); font-family: 'JetBrains Mono'; font-size: 0.8rem;">[STATUS: IDLE]</span>
        <button onclick="resetStudio()" class="action-btn" style="margin:0; padding: 5px 15px; border-color: var(--accent); color: var(--accent);">RESET</button>
    </div>
</nav>

<div class="main-wrapper">
    <aside class="panel">
        <div class="panel-header"><i class="fas fa- wand-magic-sparkles"></i> مختبر المعالجة الرقمية</div>
        <div class="panel-content">
            <div class="control-item">
                <label>السطوع <span>100%</span></label>
                <input type="range" id="br" min="0" max="200" value="100">
            </div>
            <div class="control-item">
                <label>التباين <span>100%</span></label>
                <input type="range" id="ct" min="0" max="200" value="100">
            </div>
            <div class="control-item">
                <label>التشبع <span>100%</span></label>
                <input type="range" id="sat" min="0" max="200" value="100">
            </div>
            <div class="control-item">
                <label>توازن الألوان (Hue)</label>
                <input type="range" id="hue" min="0" max="360" value="0">
            </div>
            
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
            
            <p style="font-size: 0.75rem; color: var(--primary); margin-bottom: 10px;">الفلاتر الذكية (Smart Filters)</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button onclick="applyMagic('matrix')" class="action-btn">Matrix</button>
                <button onclick="applyMagic('cyber')" class="action-btn">Cyber</button>
                <button onclick="applyMagic('grayscale')" class="action-btn">B&W</button>
                <button onclick="applyMagic('invert')" class="action-btn">Invert</button>
            </div>
        </div>
    </aside>

    <main class="viewport" id="dropFrame" onclick="triggerUpload()">
        <div id="dropPrompt" style="text-align: center; cursor: pointer;">
            <i class="fas fa-cloud-upload-alt" style="font-size: 5rem; color: var(--primary); opacity: 0.5; margin-bottom: 20px;"></i>
            <h2 style="font-family: 'Share Tech Mono'; letter-spacing: 2px;">READY FOR PAYLOAD</h2>
            <p style="opacity: 0.5; font-size: 0.9rem;">Drop Image/Video or Click to Browse</p>
        </div>
        
        <canvas id="mainCanvas"></canvas>

        <div class="terminal-box" id="terminal">
            <p style="color: var(--primary)">> Kernel-0x0 System Initialization Complete.</p>
        </div>
    </main>

    <aside class="panel">
        <div class="panel-header"><i class="fas fa-video"></i> محرك الفيديو AI</div>
        <div class="panel-content">
            <input type="text" id="videoUrl" style="width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: var(--primary); font-family: 'JetBrains Mono'; margin-bottom: 15px;" placeholder="Video URL...">
            
            <button onclick="processVideo('shorts')" class="action-btn special"><i class="fas fa-bolt"></i> Generate Shorts</button>
            <button onclick="processVideo('dub')" class="action-btn special"><i class="fas fa-language"></i> AI Dubbing (AR)</button>
            
            <div style="margin-top: 40px;">
                <div class="panel-header" style="background: none; border: none; padding: 0; margin-bottom: 15px;"><i class="fas fa-download"></i> خيارات التصدير</div>
                <button onclick="exportArt()" class="action-btn" style="background: var(--primary); color: #000; font-weight: bold;">تحميل النتيجة (PNG)</button>
            </div>
        </div>
    </aside>
</div>

<input type="file" id="imageLoader" style="display: none;" accept="image/*,video/*">

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const loader = document.getElementById('imageLoader');
    let rawImg = null;
    let currentFilter = '';

    function triggerUpload() { loader.click(); }

    loader.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    rawImg = img;
                    initCanvas();
                    document.getElementById('dropPrompt').style.display = 'none';
                    canvas.style.display = 'block';
                    addLog('PAYLOAD_ACCEPTED: ' + file.name + ' [' + img.width + 'x' + img.height + ']');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
            uploadToServer(file);
        } else {
            addLog('VIDEO_STREAM_DETECTED: Redirecting to Processing Core...');
            uploadToServer(file);
        }
    });

    function initCanvas() {
        const maxWidth = 1200;
        let scale = rawImg.width > maxWidth ? maxWidth / rawImg.width : 1;
        canvas.width = rawImg.width * scale;
        canvas.height = rawImg.height * scale;
        draw();
    }

    function draw() {
        if(!rawImg) return;
        const b = document.getElementById('br').value;
        const c = document.getElementById('ct').value;
        const s = document.getElementById('sat').value;
        const h = document.getElementById('hue').value;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%) hue-rotate(${h}deg) ${currentFilter}`;
        ctx.drawImage(rawImg, 0, 0, canvas.width, canvas.height);
    }

    function applyMagic(type) {
        if(!rawImg) return;
        currentFilter = '';
        if(type === 'grayscale') currentFilter = 'grayscale(100%)';
        else if(type === 'invert') currentFilter = 'invert(100%)';
        else if(type === 'matrix') {
            draw();
            ctx.fillStyle = "rgba(0, 20, 0, 0.3)";
            ctx.fillRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff41";
            ctx.font = "12px monospace";
            for(let i=0; i<500; i++) ctx.fillText(Math.floor(Math.random()*2), Math.random()*canvas.width, Math.random()*canvas.height);
            addLog('MATRIX_OVERLAY_INJECTED');
            return;
        }
        else if(type === 'cyber') {
            draw();
            ctx.strokeStyle = varColor('--primary');
            ctx.lineWidth = 15;
            ctx.strokeRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = varColor('--primary');
            ctx.font = "bold 16px Share Tech Mono";
            ctx.fillText("> VIP_ARM SECURITY PROTOCOL ACTIVE", 20, 30);
            return;
        }
        addLog('FILTER_APPLIED: ' + type.toUpperCase());
        draw();
    }

    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

    async function processVideo(mode) {
        const url = document.getElementById('videoUrl').value;
        if(!url) return alert("الرجاء إدخال رابط الفيديو أولاً!");

        updateStatus('PROCESSING');
        addLog('INITIATING_VIDEO_CORE: ' + mode.toUpperCase());

        try {
            const response = await fetch('/api/process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url: url, mode: mode })
            });

            if (response.ok) {
                const blob = await response.blob();
                const a = document.createElement('a');
                a.href = window.URL.createObjectURL(blob);
                a.download = `VIP_ARM_${mode}_OUT.mp4`;
                a.click();
                addLog('PROCESS_SUCCESS: File delivered.');
                updateStatus('IDLE');
            }
        } catch (e) {
            addLog('CORE_ERROR: Connection Interrupted');
            updateStatus('ERROR');
        }
    }

    function addLog(msg) {
        const term = document.getElementById('terminal');
        const p = document.createElement('p');
        p.innerHTML = `<span style="color: var(--primary)">[${new Date().toLocaleTimeString()}]</span> > ${msg}`;
        term.appendChild(p);
        term.scrollTop = term.scrollHeight;
    }

    function updateStatus(status) {
        document.getElementById('statusNode').innerText = `[STATUS: ${status}]`;
    }

    function exportArt() {
        if(!rawImg) return;
        const link = document.createElement('a');
        link.download = `VIP_ARM_STUDIO_EXPORT.png`;
        link.href = canvas.toDataURL();
        link.click();
        addLog('EXPORT_COMPLETE');
    }

    function resetStudio() { if(confirm("Kernel Reset?")) location.reload(); }

    document.querySelectorAll('input[type="range"]').forEach(i => {
        i.addEventListener('input', (e) => {
            e.target.previousElementSibling.querySelector('span').innerText = e.target.value + '%';
            draw();
        });
    });

    // Drag and Drop Logic
    const frame = document.getElementById('dropFrame');
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => {
        frame.addEventListener(n, e => { e.preventDefault(); e.stopPropagation(); });
    });
    frame.addEventListener('drop', e => {
        loader.files = e.dataTransfer.files;
        loader.dispatchEvent(new Event('change'));
    });
</script>
</body>
</html>
