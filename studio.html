<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP_ARM Studio V5 | Forensic Ultimate</title>

    <!-- UI Core Assets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

    <style>
        :root {
            --cyan: #00f2ff;
            --neon-pink: #ff007a;
            --deep-blue: #020617;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(0, 242, 255, 0.2);
            --safe-area: env(safe-area-inset-bottom);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--deep-blue);
            color: white;
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header Optimization */
        header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(15px);
            z-index: 1000;
        }

        .system-title {
            font-family: 'JetBrains Mono', monospace;
            color: var(--cyan);
            font-size: 1rem;
            text-shadow: 0 0 10px var(--cyan);
        }

        /* Main Workspace */
        .app-core {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        .canvas-area {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 30px 30px;
            padding: 20px;
        }

        #mainCanvas, #overlayCanvas {
            max-width: 95%;
            max-height: 95%;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            border-radius: 8px;
            position: absolute;
        }

        /* Side Panels (Desktop) / Bottom Sheets (Mobile) */
        .panel {
            width: 320px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 900;
        }

        .panel-header {
            padding: 15px;
            background: rgba(255,255,255,0.05);
            font-size: 0.85rem;
            color: var(--cyan);
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .scroll-box {
            padding: 15px;
            overflow-y: auto;
            flex: 1;
        }

        /* Floating Controls for Mobile */
        @media (max-width: 768px) {
            .app-core { flex-direction: column; }
            .panel {
                width: 100%;
                height: 40%;
                border-left: none;
                border-top: 1px solid var(--border);
                position: absolute;
                bottom: 0;
                transform: translateY(100%);
            }
            .panel.active { transform: translateY(0); }
            .mobile-nav {
                display: flex;
                background: black;
                padding: 10px;
                justify-content: space-around;
                border-top: 1px solid var(--border);
                padding-bottom: calc(10px + var(--safe-area));
            }
        }

        @media (min-width: 769px) {
            .mobile-nav { display: none; }
            .panel { transform: none !important; }
        }

        /* Visual Controls */
        .control-item { margin-bottom: 18px; }
        .control-item label { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px; color: #94a3b8; }
        
        input[type="range"] {
            width: 100%;
            height: 4px;
            accent-color: var(--cyan);
            cursor: pointer;
        }

        .grid-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-family: 'Cairo';
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn:active { transform: scale(0.95); }
        .btn:hover { background: var(--cyan); color: black; box-shadow: 0 0 15px var(--cyan); }
        .btn-main { background: var(--cyan); color: black; font-weight: bold; }

        /* Terminal Style */
        .mini-terminal {
            height: 100px;
            background: #000;
            padding: 10px;
            font-family: 'JetBrains Mono';
            font-size: 0.7rem;
            color: #10b981;
            border-top: 1px solid var(--border);
            overflow-y: auto;
        }

        /* Upload Placeholder */
        .drop-zone {
            border: 2px dashed var(--border);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .drop-zone:hover { border-color: var(--cyan); background: rgba(0,242,255,0.05); }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="system-title"><i class="fas fa-microchip"></i> VIP_ARM // V5.0</div>
    <div style="display: flex; gap: 10px;">
        <button class="btn" onclick="triggerUpload()" style="padding: 6px 15px;"><i class="fas fa-plus"></i></button>
        <button class="btn" onclick="exportArt()" style="padding: 6px 15px; border-color: var(--neon-pink);"><i class="fas fa-download"></i></button>
    </div>
</header>

<div class="app-core">
    <!-- Left Panel: Core Analysis -->
    <aside class="panel" id="panel-analysis">
        <div class="panel-header"><i class="fas fa-bolt"></i> التحليل السريع</div>
        <div class="scroll-box">
            <div class="control-item">
                <label>السطوع الجنائي <span id="val-br">100%</span></label>
                <input type="range" id="br" min="0" max="200" value="100" oninput="applyAll()">
            </div>
            <div class="control-item">
                <label>تباين الأدلة <span id="val-ct">100%</span></label>
                <input type="range" id="ct" min="0" max="200" value="100" oninput="applyAll()">
            </div>
            
            <p style="font-size: 0.7rem; color: var(--cyan); margin: 15px 0 10px;">الفلاتر السينمائية الجديدة:</p>
            <div class="grid-actions">
                <button class="btn" onclick="setFilter('vintage')"><i class="fas fa-camera"></i> Vintage</button>
                <button class="btn" onclick="setFilter('cold')"><i class="fas fa-snowflake"></i> Cold Ice</button>
                <button class="btn" onclick="setFilter('urban')"><i class="fas fa-city"></i> Urban</button>
                <button class="btn" onclick="setFilter('dramatic')"><i class="fas fa-theater-masks"></i> Drama</button>
            </div>
        </div>
    </aside>

    <!-- Center Workspace -->
    <main class="canvas-area" id="dropFrame">
        <div id="dropPrompt" class="drop-zone" onclick="triggerUpload()">
            <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; color: var(--cyan); margin-bottom: 15px;"></i>
            <h3>استيراد البيانات</h3>
            <p style="font-size: 0.8rem; opacity: 0.6;">اسحب الصورة هنا أو اضغط للاختيار</p>
        </div>
        <canvas id="mainCanvas"></canvas>
        <canvas id="overlayCanvas"></canvas>
    </main>

    <!-- Right Panel: AI & OSINT -->
    <aside class="panel" id="panel-ai">
        <div class="panel-header"><i class="fas fa-robot"></i> الذكاء الاصطناعي</div>
        <div class="scroll-box">
            <button class="btn btn-main" id="aiBtn" onclick="initAI()" style="width: 100%; margin-bottom: 15px;">
                <i class="fas fa-brain"></i> تشغيل محرك المعالجة
            </button>
            
            <div id="aiTools" class="hidden">
                <div class="grid-actions">
                    <button class="btn" onclick="detectFaces()"><i class="fas fa-id-card"></i> كشف الوجوه</button>
                    <button class="btn" onclick="anonymize()"><i class="fas fa-mask"></i> تجهيل</button>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
            
            <div class="control-item">
                <label>رابط التحقيق (OSINT)</label>
                <input type="text" id="osintUrl" placeholder="URL..." style="width: 100%; background: #000; border: 1px solid var(--border); padding: 10px; border-radius: 8px; color: var(--cyan); margin-top: 5px;">
            </div>
            <button class="btn" style="width: 100%;" onclick="addLog('OSINT: Scanning Node...')">فحص المصدر</button>
        </div>
        
        <div class="mini-terminal" id="terminal">
            <div>> VIP_ARM OS V5.0 Ready...</div>
        </div>
    </aside>
</div>

<!-- Mobile Navigation Bar -->
<nav class="mobile-nav">
    <button class="btn" onclick="togglePanel('analysis')"><i class="fas fa-sliders-h"></i></button>
    <button class="btn" onclick="togglePanel('ai')"><i class="fas fa-robot"></i></button>
    <button class="btn" onclick="setFilter('none')"><i class="fas fa-sync"></i></button>
</nav>

<input type="file" id="fileInput" hidden accept="image/*">

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlayCanvas');
    const octx = overlay.getContext('2d');
    const fileInput = document.getElementById('fileInput');
    
    let rawImg = null;
    let activeFilter = 'none';
    let aiReady = false;

    // تفعيل الرفع
    function triggerUpload() { fileInput.click(); }

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                rawImg = img;
                resizeCanvas();
                document.getElementById('dropPrompt').classList.add('hidden');
                addLog("System: تم استيراد الصورة بنجاح.");
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    function resizeCanvas() {
        if(!rawImg) return;
        const container = document.querySelector('.canvas-area');
        const ratio = Math.min(container.clientWidth / rawImg.width, container.clientHeight / rawImg.height) * 0.9;
        canvas.width = overlay.width = rawImg.width * ratio;
        canvas.height = overlay.height = rawImg.height * ratio;
        applyAll();
    }

    function applyAll() {
        if(!rawImg) return;
        
        // Update UI labels
        document.getElementById('val-br').innerText = document.getElementById('br').value + '%';
        document.getElementById('val-ct').innerText = document.getElementById('ct').value + '%';

        ctx.clearRect(0,0, canvas.width, canvas.height);
        
        // Apply Filters
        let filterString = `brightness(${document.getElementById('br').value}%) contrast(${document.getElementById('ct').value}%) `;
        
        switch(activeFilter) {
            case 'vintage': filterString += 'sepia(50%) contrast(120%)'; break;
            case 'cold': filterString += 'hue-rotate(180deg) saturate(80%)'; break;
            case 'urban': filterString += 'contrast(150%) grayscale(30%)'; break;
            case 'dramatic': filterString += 'saturate(20%) contrast(140%) brightness(80%)'; break;
        }

        ctx.filter = filterString;
        ctx.drawImage(rawImg, 0, 0, canvas.width, canvas.height);
    }

    function setFilter(f) {
        activeFilter = f;
        applyAll();
        addLog(`Effect: تم تطبيق فلتر ${f}`);
    }

    // AI Engine
    async function initAI() {
        addLog("AI: جاري تحميل المحرك العصبي...");
        try {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
            ]);
            aiReady = true;
            document.getElementById('aiTools').classList.remove('hidden');
            document.getElementById('aiBtn').innerHTML = "<i class='fas fa-shield-check'></i> المحرك يعمل";
            addLog("AI: المحرك جاهز للتحليل الجنائي.");
        } catch(e) {
            addLog("Error: فشل الاتصال بخوادم الذكاء الاصطناعي.");
        }
    }

    async function detectFaces() {
        if(!aiReady) return;
        octx.clearRect(0,0, overlay.width, overlay.height);
        const detections = await faceapi.detectAllFaces(canvas, new faceapi.TinyFaceDetectorOptions());
        if(detections.length > 0) {
            addLog(`Found: تم رصد ${detections.length} وجه.`);
            faceapi.draw.drawDetections(overlay, detections);
        } else {
            addLog("Search: لم يتم رصد أهداف بيومترية.");
        }
    }

    async function anonymize() {
        if(!aiReady) return;
        const detections = await faceapi.detectAllFaces(canvas, new faceapi.TinyFaceDetectorOptions());
        detections.forEach(d => {
            const { x, y, width, height } = d.box;
            ctx.fillStyle = "black";
            ctx.fillRect(x, y + height/3, width, height/3);
        });
        addLog("Security: تم تجهيل الأهداف المرصودة.");
    }

    // UI Helpers
    function togglePanel(id) {
        const panels = ['panel-analysis', 'panel-ai'];
        panels.forEach(p => {
            const el = document.getElementById(p);
            if(p === 'panel-' + id) el.classList.toggle('active');
            else el.classList.remove('active');
        });
    }

    function addLog(msg) {
        const term = document.getElementById('terminal');
        const line = document.createElement('div');
        line.innerHTML = `<span style="color:rgba(255,255,255,0.3)">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
        term.prepend(line);
    }

    function exportArt() {
        if(!rawImg) return;
        const link = document.createElement('a');
        link.download = `VIP_ARM_V5_${Date.now()}.png`;
        link.href = canvas.toDataURL();
        link.click();
    }

    window.onresize = resizeCanvas;
</script>
</body>
</html>
