<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VIP_ARM | Secure Tunnel 0x0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #05080f;
            --panel-dark: #0c121d;
            --accent: #00f2ff;
            --danger: #ff003c;
            --text-main: #e5e7eb;
            --sent-bg: #112240;
            --recv-bg: #1a1a1a;
            --border: #1e293b;
            /* حل مشكلة الطول في الهواتف */
            --app-height: 100vh; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html { 
            height: 100dvh; /* Dynamic Viewport Height */
            margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg-dark); 
            font-family: 'Cairo', sans-serif; 
            color: var(--text-main); 
            position: fixed; width: 100%; 
        }
        
        #matrix-canvas { position: fixed; top: 0; left: 0; opacity: 0.12; z-index: 0; pointer-events: none; }

        /* الشاشة المقفلة (The Vault) */
        #vault-lock {
            position: fixed; top:0; left:0; width:100%; height:100dvh; background: var(--bg-dark);
            z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
        .lock-box { 
            background: var(--panel-dark); padding: 30px; border-radius: 20px; 
            border: 1px solid var(--accent); text-align: center; width: 90%; 
            max-width: 350px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); 
            backdrop-filter: blur(10px);
        }

        .app-container { 
            display: flex; height: 100dvh; width: 100vw; position: relative; z-index: 1; 
        }

        /* Sidebar */
        .chat-nav { 
            width: 280px; background: var(--panel-dark); border-left: 1px solid var(--border); 
            display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000;
        }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: rgba(5, 8, 15, 0.85); min-width: 0; position: relative; }

        .messages { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; 
            flex-direction: column; gap: 15px; scrollbar-width: thin;
            padding-bottom: 30px;
        }
        .messages::-webkit-scrollbar { width: 3px; }
        .messages::-webkit-scrollbar-thumb { background: var(--accent); }

        .msg { 
            max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; 
            position: relative; line-height: 1.5; animation: msgSlide 0.3s ease;
            word-wrap: break-word;
        }
        @keyframes msgSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.sent { align-self: flex-start; background: var(--sent-bg); border-bottom-left-radius: 4px; border: 1px solid #233554; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .msg.received { align-self: flex-end; background: var(--recv-bg); border-bottom-right-radius: 4px; border: 1px solid var(--border); }
        .msg strong { display: block; font-size: 0.75rem; color: var(--accent); margin-bottom: 6px; font-family: 'Fira Code'; letter-spacing: 1px; }

        /* منطقة الإدخال المحدثة لتعمل فوق شريط التنقل */
        .input-area { 
            padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); 
            background: var(--panel-dark); display: flex; gap: 10px; 
            align-items: center; border-top: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .input-wrapper { 
            flex: 1; background: rgba(0,0,0,0.5); border-radius: 15px; 
            padding: 2px 15px; border: 1px solid var(--border); display: flex; 
            align-items: center; transition: 0.3s;
        }
        .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 242, 255, 0.1); }
        .input-wrapper input { 
            flex: 1; background: transparent; border: none; color: white; 
            padding: 12px 5px; font-size: 1rem; 
        }
        
        .btn-action { 
            background: none; border: none; color: var(--accent); 
            font-size: 1.3rem; cursor: pointer; transition: 0.2s; 
            display: flex; align-items: center; justify-content: center;
        }
        .btn-action:active { transform: scale(0.9); }
        
        .btn-send { 
            background: var(--accent); color: #000; width: 45px; height: 45px; 
            border-radius: 15px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; border: none;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--panel-dark); padding: 25px; border-radius: 20px; 
            border: 1px solid var(--accent); z-index: 2000; display: none; 
            width: 90%; max-width: 400px; box-shadow: 0 0 50px rgba(0,0,0,0.9); 
        }

        .status-pill { padding: 3px 10px; border-radius: 20px; font-size: 10px; font-family: 'Fira Code'; text-transform: uppercase; border: 1px solid; }
        .online { border-color: #00ff88; color: #00ff88; box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }

        @media (max-width: 768px) {
            .chat-nav { position: absolute; right: -280px; height: 100dvh; }
            .chat-nav.active { transform: translateX(-280px); }
        }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<!-- شاشة القفل -->
<div id="vault-lock">
    <div class="lock-box">
        <i class="fas fa-shield-halved" style="font-size: 3.5rem; color: var(--accent); margin-bottom: 20px;"></i>
        <h2 style="margin: 0; font-family: 'Fira Code'; letter-spacing: 2px;">SECURE NODE</h2>
        <p id="vault-status" style="font-size: 0.85rem; color: #888; margin: 15px 0 25px;">يجب فك تشفير النفق للوصول إلى البيانات.</p>
        <input type="password" id="vault-pass" placeholder="Encryption Key..." style="width: 100%; padding: 15px; background: #000; border: 1px solid var(--border); border-radius: 12px; color: var(--accent); text-align: center; margin-bottom: 20px; font-size: 1.1rem;">
        <button onclick="unlockVault()" style="width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; color: #000;">CONNECT TO CHANNEL</button>
    </div>
</div>

<div class="app-container">
    <div class="chat-nav" id="sidebar">
        <div style="padding: 30px 20px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2);">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="status-pill online">Master</div>
                <h3 style="color: var(--accent); font-family: 'Fira Code'; margin: 0; font-size: 1.1rem;">KERNEL-0x0</h3>
            </div>
        </div>
        <div style="padding: 20px; display: grid; gap: 12px;">
            <button onclick="location.href='/'" style="padding:14px; background:#111; color:white; border:1px solid var(--border); border-radius:12px; cursor:pointer; text-align:right;"><i class="fas fa-terminal" style="margin-left: 10px;"></i> Terminal System</button>
            <button onclick="setupNewTunnel()" style="padding:14px; background:var(--accent); color:black; border:none; border-radius:12px; font-weight:bold; cursor:pointer; text-align:right;"><i class="fas fa-plus-circle" style="margin-left: 10px;"></i> إنشاء نفق جديد</button>
        </div>
        <div id="admin-tools" style="margin-top: auto; padding: 20px; display: none; background: rgba(255,0,0,0.05);">
            <button onclick="destroyTunnel()" style="width:100%; padding:14px; background:var(--danger); color:white; border:none; border-radius:12px; font-weight:bold;"><i class="fas fa-radiation"></i> تدمير كافة السجلات</button>
        </div>
    </div>

    <div class="chat-main">
        <header style="padding: 15px 20px; background: var(--panel-dark); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); z-index: 10;">
            <div style="display: flex; align-items: center; gap: 15px;">
                 <button onclick="toggleSidebar()" class="btn-action"><i class="fas fa-bars"></i></button>
                 <div>
                    <div id="room-display" style="color: var(--accent); font-weight: bold; font-size: 0.9rem;">Initializing...</div>
                    <div style="font-size: 9px; opacity: 0.6; letter-spacing: 2px; font-family: 'Fira Code';">E2EE PROTOCOL V14</div>
                </div>
            </div>
            <button onclick="showInvite()" class="btn-action"><i class="fas fa-share-nodes"></i></button>
        </header>

        <div class="messages" id="chat-box"></div>

        <div class="input-area">
            <label class="btn-action" title="إرسال صورة">
                <i class="fas fa-image"></i>
                <input type="file" id="fileInp" hidden accept="image/*">
            </label>
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="أرسل إشارة مشفرة..." autocomplete="off">
            </div>
            <button class="btn-send" id="sendBtn">
                <i class="fas fa-paper-plane" style="transform: rotate(-45deg) translate(2px, -2px);"></i>
            </button>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="tunnelModal" class="modal">
    <h3 style="margin-top:0; color: var(--accent);">بروتوكول النفق الجديد</h3>
    <p style="font-size: 0.85rem; color: #aaa; line-height: 1.4;">سيتم توليد نفق فريد. كلمة السر تُستخدم كطبقة تشفير AES-256 محلية ولا تلمس قواعد البيانات.</p>
    <input type="password" id="new-room-pass" placeholder="كلمة سر النفق (مفتاح التشفير)..." style="width: 100%; padding: 14px; background: #000; border: 1px solid var(--accent); color: white; border-radius: 10px; margin-bottom: 20px; font-size: 1rem;">
    <div style="display: flex; gap: 10px;">
        <button onclick="confirmNewTunnel()" style="flex: 2; padding: 12px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; color:#000;">توليد الهوية</button>
        <button onclick="closeModal()" style="flex: 1; background:#222; border:none; color:white; border-radius: 10px;">إلغاء</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io({
        transports: ['websocket'],
        reconnection: true,
        reconnectionDelay: 1000
    });

    const SYS_KEY = "VIP_ARM_SECRET_0x0";
    let currentRoom = "global";
    let tunnelKey = "";
    let isAdmin = false;

    if(!sessionStorage.getItem('chat_user')) {
        sessionStorage.setItem('chat_user', "NODE_" + Math.random().toString(36).substr(2, 4).toUpperCase());
    }
    const myUsername = sessionStorage.getItem('chat_user');

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const room = params.get('room');

        if (!room || room === 'global') {
            document.getElementById('vault-lock').style.display = 'none';
            initChat('global', '');
        } else {
            const savedKey = localStorage.getItem('key_' + room);
            if(savedKey) {
                tunnelKey = savedKey;
                unlockVault();
            }
        }
        initMatrix();
    };

    function unlockVault() {
        const passInp = document.getElementById('vault-pass').value || tunnelKey;
        if(!passInp && document.getElementById('vault-lock').style.display !== 'none') return alert("مفتاح التشفير مطلوب!");
        
        const params = new URLSearchParams(window.location.search);
        const room = params.get('room') || 'global';
        
        tunnelKey = passInp;
        document.getElementById('vault-lock').style.display = 'none';
        localStorage.setItem('key_' + room, tunnelKey);
        initChat(room, tunnelKey);
    }

    function initChat(room, key) {
        currentRoom = room;
        socket.emit('join', { room: room, user: myUsername });
        document.getElementById('room-display').innerText = room === 'global' ? "GLOBAL_TUNNEL_0x0" : "ENCRYPTED_NODE: " + room;
        
        if (localStorage.getItem('owner_' + room)) {
            isAdmin = true;
            document.getElementById('admin-tools').style.display = 'block';
        }

        const saved = localStorage.getItem('history_' + room);
        if (saved) {
            document.getElementById('chat-box').innerHTML = saved;
            scrollDown();
        }
    }

    const sendMsg = () => {
        const inp = document.getElementById('userInput');
        const text = inp.value.trim();
        if (!text) return;

        const combinedKey = SYS_KEY + tunnelKey;
        const encrypted = CryptoJS.AES.encrypt(text, combinedKey).toString();
        
        socket.emit('message', { room: currentRoom, msg: encrypted, user: myUsername });
        append("أنت", text, 'sent');
        inp.value = "";
    };

    socket.on('message', (data) => {
        if (data.user !== myUsername) {
            if(data.type === 'clear') {
                clearLocalHistory();
                return;
            }
            try {
                const combinedKey = SYS_KEY + tunnelKey;
                const bytes = CryptoJS.AES.decrypt(data.msg, combinedKey);
                const original = bytes.toString(CryptoJS.enc.Utf8);
                if (original) append(data.user, original, 'received');
            } catch (e) { console.error("Decryption Fail"); }
        }
    });

    function clearLocalHistory() {
        document.getElementById('chat-box').innerHTML = "";
        localStorage.removeItem('history_' + currentRoom);
    }

    function append(user, msg, type) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        
        // التحقق إذا كان المحتوى صورة
        let content = msg;
        if(msg.includes('<img')) {
            content = msg;
        } else {
            // تحويل الروابط لنصوص قابلة للنقر
            content = msg.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:var(--accent)">$1</a>');
        }

        div.innerHTML = `<strong>${user}</strong><div>${content}</div>`;
        box.appendChild(div);
        scrollDown();
        localStorage.setItem('history_' + currentRoom, box.innerHTML);
    }

    function destroyTunnel() {
        if(confirm("سيتم تدمير السجلات لدى الجميع. هل أنت متأكد؟")) {
            socket.emit('message', { room: currentRoom, msg: "CMD_DESTROY", user: myUsername, type: "clear" });
            clearLocalHistory();
        }
    }

    function setupNewTunnel() { document.getElementById('tunnelModal').style.display = 'block'; }
    function closeModal() { document.getElementById('tunnelModal').style.display = 'none'; }

    function confirmNewTunnel() {
        const pass = document.getElementById('new-room-pass').value;
        if(!pass) return alert("يجب تعيين مفتاح تشفير!");
        const roomId = "0x0_" + Math.random().toString(36).substr(2, 6).toUpperCase();
        localStorage.setItem('owner_' + roomId, "true");
        localStorage.setItem('key_' + roomId, pass);
        window.location.href = `?room=${roomId}`;
    }

    function showInvite() {
        const url = window.location.href;
        const dummy = document.createElement("input");
        document.body.appendChild(dummy);
        dummy.value = url;
        dummy.select();
        document.execCommand("copy");
        document.body.removeChild(dummy);
        alert("تم نسخ رابط النفق المشفر.\nأرسل المفتاح لصديقك عبر وسيلة آمنة.");
    }

    function scrollDown() {
        const box = document.getElementById('chat-box');
        box.scrollTop = box.scrollHeight;
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    // Matrix Background Enhanced
    function initMatrix() {
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = "0101010101VIPARMKERNEL0X0";
        const drops = Array(Math.floor(canvas.width/20)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(5, 8, 15, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00f2ff";
            ctx.font = "14px 'Fira Code'";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * 20, y * 20);
                if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 40);
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
    document.getElementById('sendBtn').addEventListener('click', sendMsg);

    document.getElementById('fileInp').addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const imgTag = `<img src="${e.target.result}" style="max-width:100%; border-radius:10px; margin-top:8px; border:1px solid var(--border);">`;
                const combinedKey = SYS_KEY + tunnelKey;
                const encrypted = CryptoJS.AES.encrypt(imgTag, combinedKey).toString();
                socket.emit('message', { room: currentRoom, msg: encrypted, user: myUsername });
                append("أنت", imgTag, 'sent');
            };
            reader.readAsDataURL(file);
        }
    });
</script>
</body>
</html>
