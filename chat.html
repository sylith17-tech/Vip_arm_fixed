<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VIP_ARM | Kernel-0x0 OMEGA V16.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #010204;
            --panel-dark: rgba(6, 9, 15, 0.98);
            --accent: #00f2ff;
            --danger: #ff003c;
            --text-main: #e5e7eb;
            --sent-bg: rgba(10, 25, 47, 0.9);
            --recv-bg: rgba(20, 20, 20, 0.9);
            --border: #1a2634;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: var(--text-main); position: fixed; width: 100%; }
        
        #matrix-canvas { position: fixed; top: 0; left: 0; opacity: 0.1; z-index: 0; pointer-events: none; }

        /* Secure Overlay */
        #vault-lock { position: fixed; top:0; left:0; width:100%; height:100dvh; background: var(--bg-dark); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(25px); }
        .lock-box { background: var(--panel-dark); padding: 40px; border-radius: 25px; border: 1px solid var(--accent); text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 50px rgba(0, 242, 255, 0.1); }

        .app-container { display: flex; height: 100dvh; width: 100vw; position: relative; z-index: 1; }
        .chat-nav { width: 280px; background: var(--panel-dark); border-left: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.4s ease; z-index: 1000; }
        .chat-nav.active { transform: translateX(-280px); }

        .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 18px; font-size: 0.95rem; animation: slideIn 0.2s ease-out; word-wrap: break-word; border: 1px solid var(--border); position: relative; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.sent { align-self: flex-start; background: var(--sent-bg); border-bottom-left-radius: 4px; border-color: rgba(0, 242, 255, 0.2); }
        .msg.received { align-self: flex-end; background: var(--recv-bg); border-bottom-right-radius: 4px; }
        .msg strong { display: block; font-size: 0.7rem; color: var(--accent); margin-bottom: 4px; font-family: 'Fira Code'; }

        .input-area { padding: 15px 20px; background: var(--panel-dark); display: flex; gap: 10px; align-items: center; border-top: 1px solid var(--border); }
        .input-wrapper { flex: 1; background: #000; border-radius: 15px; padding: 2px 15px; border: 1px solid var(--border); display: flex; align-items: center; }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 1rem; }
        
        .btn-send { background: var(--accent); color: #000; width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; font-size: 1.2rem; }

        .auth-error { color: var(--danger); font-size: 0.8rem; margin-top: 10px; display: none; }

        @media (max-width: 768px) {
            .chat-nav { position: absolute; right: -280px; height: 100dvh; }
            .chat-nav.active { transform: translateX(-280px); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<canvas id="matrix-canvas"></canvas>

<div id="vault-lock">
    <div class="lock-box">
        <i class="fas fa-fingerprint" style="font-size: 3.5rem; color: var(--accent); margin-bottom: 20px;"></i>
        <h2 style="font-family: 'Fira Code';">ACCESS PROTOCOL</h2>
        <p style="color: #555; font-size: 0.8rem;">V16.1 OMEGA SECURE NODE</p>
        <input type="password" id="vault-pass" placeholder="Master Key..." style="width: 100%; padding: 15px; background: #000; border: 1px solid var(--border); border-radius: 12px; color: var(--accent); text-align: center; margin-bottom: 10px;">
        <div id="auth-err-msg" class="auth-error">تحذير: مفتاح التشفير غير متطابق مع النفق!</div>
        <button onclick="attemptAccess()" style="width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px;">INITIALIZE LINK</button>
    </div>
</div>

<div class="app-container">
    <div class="chat-nav" id="sidebar">
        <div style="padding: 25px; border-bottom: 1px solid var(--border);">
            <h3 style="color: var(--accent); font-family: 'Fira Code'; margin: 0;">K-0x0 OMEGA</h3>
        </div>
        <div style="padding: 20px; display: grid; gap: 10px;">
            <button onclick="location.href='/'" style="padding:15px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); border-radius:12px; cursor:pointer;"><i class="fas fa-home"></i> الرئيسية</button>
            <button onclick="generateNewTunnel()" style="padding:15px; background:var(--accent); color:black; border:none; border-radius:12px; font-weight:bold; cursor:pointer;"><i class="fas fa-plus-circle"></i> نفق جديد</button>
        </div>
        <div style="margin-top: auto; padding: 20px;">
            <button onclick="panicDestruct()" style="width:100%; padding:15px; background:var(--danger); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">تدمير الجلسة</button>
        </div>
    </div>

    <div class="chat-main">
        <header style="padding: 15px 20px; background: var(--panel-dark); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button onclick="toggleSidebar()" style="background:none; border:none; color:var(--accent); font-size:1.2rem;"><i class="fas fa-bars"></i></button>
                <div id="node-id-display" style="font-family: 'Fira Code'; color: var(--accent);">STREAMS..</div>
            </div>
            <div style="display: flex; gap: 15px;">
                <button onclick="copyTunnelURL()" style="background:none; border:none; color:var(--accent);"><i class="fas fa-link"></i></button>
                <button onclick="clearChat()" style="background:none; border:none; color:var(--danger);"><i class="fas fa-eraser"></i></button>
            </div>
        </header>

        <div class="messages" id="chat-box"></div>

        <div class="input-area">
            <label style="cursor:pointer; color:var(--accent); font-size:1.2rem;">
                <i class="fas fa-paperclip"></i>
                <input type="file" id="fileInp" hidden accept="image/*">
            </label>
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Signal text..." autocomplete="off">
            </div>
            <button class="btn-send" id="sendBtn"><i class="fas fa-shuttle-space"></i></button>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io({ 
        transports: ['websocket'], // فرض الـ Websocket لتقليل أخطاء Bad File Descriptor
        reconnection: true,
        upgrade: false 
    });

    let tunnelID = "";
    let masterKey = "";
    const internalSalt = "CORE_V16_STABLE_";
    const myID = sessionStorage.getItem('v16_uid') || "NODE-" + Math.random().toString(36).substr(2, 4).toUpperCase();
    sessionStorage.setItem('v16_uid', myID);

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        tunnelID = params.get('room') || 'global';
        
        if (tunnelID === 'global') {
            document.getElementById('vault-lock').style.display = 'none';
            startNode('global', 'GLOBAL_DEF');
        } else {
            const saved = sessionStorage.getItem('v16_key_' + tunnelID);
            if(saved) {
                masterKey = saved;
                document.getElementById('vault-lock').style.display = 'none';
                startNode(tunnelID, masterKey);
            }
        }
        drawMatrix();
    };

    function attemptAccess() {
        const pass = document.getElementById('vault-pass').value;
        if(!pass) return;

        // التصحيح: اشتقاق البصمة من كلمة السر فقط لمطابقة دالة التوليد
        const currentPassFingerprint = CryptoJS.SHA256(pass).toString().substr(0, 4).toUpperCase();
        const expectedPrefix = tunnelID.split('_')[1]; 

        if (tunnelID.includes('K0X0_') && expectedPrefix && currentPassFingerprint !== expectedPrefix) {
            document.getElementById('auth-err-msg').style.display = 'block';
            return;
        }

        masterKey = pass;
        sessionStorage.setItem('v16_key_' + tunnelID, masterKey);
        document.getElementById('vault-lock').style.display = 'none';
        startNode(tunnelID, masterKey);
    }

    function startNode(room, key) {
        socket.emit('join', { room: room, user: myID });
        document.getElementById('node-id-display').innerText = "TUNNEL: " + room.replace("K0X0_", "");
        socket.removeAllListeners('message');
        
        socket.on('message', (data) => {
            try {
                const decrypted = CryptoJS.AES.decrypt(data.msg, internalSalt + key);
                const originalText = decrypted.toString(CryptoJS.enc.Utf8);
                if (originalText) {
                    const userDec = CryptoJS.AES.decrypt(data.user, internalSalt + key).toString(CryptoJS.enc.Utf8);
                    if (userDec !== myID) pushMsg(userDec, originalText, 'received');
                }
            } catch (e) { console.error("Decryption Error: Key Mismatch"); }
        });
    }

    const sendSignal = () => {
        const inp = document.getElementById('userInput');
        const text = inp.value.trim();
        if (!text || !masterKey) return;
        const keyToUse = internalSalt + masterKey;
        const encMsg = CryptoJS.AES.encrypt(text, keyToUse).toString();
        const encUser = CryptoJS.AES.encrypt(myID, keyToUse).toString();
        socket.emit('message', { room: tunnelID, msg: encMsg, user: encUser });
        pushMsg("أنت", text, 'sent');
        inp.value = "";
    };

    function pushMsg(user, msg, type) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        const content = msg.startsWith('<img') ? msg : msg.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:var(--accent)">$1</a>');
        div.innerHTML = `<strong>${user}</strong><div>${content}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function generateNewTunnel() {
        const pass = prompt("أدخل مفتاح التشفير للنفق الجديد:");
        if(!pass) return;
        const fingerprint = CryptoJS.SHA256(pass).toString().substr(0, 4).toUpperCase();
        const newID = "K0X0_" + fingerprint + "_" + Math.random().toString(36).substr(2, 4).toUpperCase();
        sessionStorage.setItem('v16_key_' + newID, pass);
        window.location.href = `?room=${newID}`;
    }

    function copyTunnelURL() {
        navigator.clipboard.writeText(window.location.href).then(() => alert("تم نسخ رابط النفق بنجاح."));
    }

    function panicDestruct() {
        if(confirm("سيتم تدمير كافة المفاتيح والجلسة!")) {
            sessionStorage.clear();
            window.location.replace("https://www.google.com");
        }
    }

    function clearChat() { document.getElementById('chat-box').innerHTML = ""; }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendSignal(); });
    document.getElementById('sendBtn').addEventListener('click', sendSignal);

    function drawMatrix() {
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/20)).fill(1);
        setInterval(() => {
            ctx.fillStyle = "rgba(1, 2, 4, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00f2ff"; ctx.font = "14px monospace";
            drops.forEach((y, i) => {
                const text = String.fromCharCode(0x30A0 + Math.random() * 33);
                ctx.fillText(text, i*20, y*20);
                if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }, 50);
    }
</script>
</body>
</html>
