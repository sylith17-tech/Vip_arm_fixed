<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VIP_ARM | Kernel-0x0 OMEGA V16.2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #010409;
            --panel-dark: #0d1117;
            --accent: #00f2ff;
            --danger: #ff003c;
            --text-main: #e6edf3;
            --sent-bg: rgba(13, 31, 45, 0.95);
            --recv-bg: rgba(22, 27, 34, 0.95);
            --border: #30363d;
            --sidebar-w: 300px;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        body, html { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: var(--text-main); position: fixed; width: 100%; }
        
        #matrix-canvas { position: fixed; top: 0; left: 0; opacity: 0.15; z-index: 0; pointer-events: none; }
        
        /* Secure Overlay */
        #vault-lock { position: fixed; top:0; left:0; width:100%; height:100dvh; background: var(--bg-dark); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .lock-box { background: var(--panel-dark); padding: 40px; border-radius: 20px; border: 1px solid var(--accent); text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 40px rgba(0, 242, 255, 0.05); }
        
        .app-container { display: flex; height: 100dvh; width: 100vw; position: relative; z-index: 1; }
        
        /* Sidebar Enhanced */
        .chat-nav { width: var(--sidebar-w); background: var(--panel-dark); border-left: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        .tunnel-list { flex: 1; overflow-y: auto; padding: 10px; }
        .tunnel-item { padding: 12px 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; position: relative; }
        .tunnel-item:hover { border-color: var(--accent); background: rgba(0, 242, 255, 0.05); }
        .tunnel-item.active { border-left: 4px solid var(--accent); background: rgba(0, 242, 255, 0.1); }
        .tunnel-item .id { font-family: 'Fira Code'; font-size: 0.75rem; color: var(--accent); display: block; }
        .tunnel-item .name { font-weight: bold; font-size: 0.9rem; }

        .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: rgba(1, 4, 9, 0.8); }

        /* Messages Styling */
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 0.95rem; border: 1px solid var(--border); position: relative; line-height: 1.5; }
        .msg.sent { align-self: flex-start; background: var(--sent-bg); border-bottom-left-radius: 2px; }
        .msg.received { align-self: flex-end; background: var(--recv-bg); border-bottom-right-radius: 2px; }
        .msg strong { display: block; font-size: 0.65rem; color: var(--accent); font-family: 'Fira Code'; margin-bottom: 5px; opacity: 0.8; }

        .msg-meta { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 5px; font-size: 0.65rem; opacity: 0.6; }

        #typing-indicator { font-size: 0.7rem; color: var(--accent); font-family: 'Fira Code'; padding: 5px 25px; height: 20px; opacity: 0; transition: opacity 0.3s ease; }

        .input-area { padding: 15px; background: var(--panel-dark); border-top: 1px solid var(--border); }
        .input-wrapper { display: flex; gap: 10px; align-items: center; background: #000; padding: 5px 15px; border-radius: 12px; border: 1px solid var(--border); }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; padding: 10px; font-size: 0.95rem; }

        .btn-action { background: none; border: none; color: var(--accent); font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn-action:hover { transform: scale(1.1); color: white; }

        @media (max-width: 768px) {
            .chat-nav { position: absolute; right: -100%; height: 100dvh; width: 85%; }
            .chat-nav.open { right: 0; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<canvas id="matrix-canvas"></canvas>

<div id="vault-lock">
    <div class="lock-box">
        <div style="margin-bottom: 20px;"><i class="fas fa-shield-halved" style="font-size: 3rem; color: var(--accent);"></i></div>
        <h2 style="font-family: 'Fira Code'; margin: 0;">KERNEL-0X0 OMEGA</h2>
        <p style="color: #8b949e; font-size: 0.8rem; margin-bottom: 25px;">V16.2 SECURE COMMUNICATION NODE</p>
        <input type="password" id="vault-pass" placeholder="Enter Master Key..." style="width: 100%; padding: 15px; background: #0d1117; border: 1px solid var(--border); border-radius: 10px; color: var(--accent); text-align: center; margin-bottom: 15px;">
        <div id="auth-err-msg" class="auth-error" style="color: var(--danger); font-size: 0.8rem; display: none; margin-bottom: 10px;">خطأ: بصمة المفتاح غير صالحة لهذا النفق!</div>
        <button onclick="attemptAccess()" style="width: 100%; padding: 15px; background: var(--accent); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">فتح النفق</button>
    </div>
</div>

<div class="app-container">
    <div class="chat-nav" id="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid var(--border);">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-family: 'Fira Code'; color: var(--accent); font-weight: bold;">MY TUNNELS</span>
                <button onclick="toggleSidebar()" class="btn-action"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <div class="tunnel-list" id="tunnels-container">
            </div>

        <div style="padding: 15px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2);">
            <button onclick="createNewTunnel()" style="width: 100%; padding: 12px; background: var(--accent); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px;">
                <i class="fas fa-plus"></i> إنشاء نفق جديد
            </button>
            <button onclick="panicDestruct()" style="width: 100%; padding: 10px; background: none; color: var(--danger); border: 1px solid var(--danger); border-radius: 8px; cursor: pointer; font-size: 0.8rem;">
                <i class="fas fa-biohazard"></i> تدمير كافة البيانات
            </button>
        </div>
    </div>

    <div class="chat-main">
        <header style="padding: 12px 20px; background: var(--panel-dark); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button onclick="toggleSidebar()" class="btn-action"><i class="fas fa-bars"></i></button>
                <div>
                    <div id="current-tunnel-name" style="font-weight: bold; font-size: 0.95rem;">إشارة عالمية</div>
                    <div id="status-label" style="font-size: 0.7rem; color: var(--accent); font-family: 'Fira Code';">NODE: ACTIVE</div>
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <button title="تحديث المزامنة" onclick="refreshSync()" class="btn-action" id="sync-btn-icon"><i class="fas fa-sync-alt"></i></button>
                <button title="نسخ رابط النفق" onclick="copyTunnelURL()" class="btn-action"><i class="fas fa-share-nodes"></i></button>
                <button title="مسح المحادثة" onclick="clearCurrentChat()" class="btn-action" style="color: var(--danger);"><i class="fas fa-trash-alt"></i></button>
            </div>
        </header>

        <div class="messages" id="chat-box"></div>

        <div id="typing-indicator">الطرف الآخر يقوم بتشفير رسالة...</div>

        <div class="input-area">
            <div class="input-wrapper">
                <label style="cursor:pointer; color:var(--accent);">
                    <i class="fas fa-paperclip"></i>
                    <input type="file" id="fileInp" hidden accept="image/*">
                </label>
                <input type="text" id="userInput" placeholder="Type secure message..." autocomplete="off">
                <button id="sendBtn" class="btn-action" style="color: var(--accent); font-size: 1.4rem;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io({ 
        transports: ['websocket'], 
        reconnection: true,
        upgrade: false 
    });

    let currentTunnel = 'global';
    let masterKey = '';
    let tunnels = JSON.parse(localStorage.getItem('k0x0_tunnels')) || [{id: 'global', name: 'Global Signal', key: 'GLOBAL_DEF'}];
    const myID = localStorage.getItem('k0x0_uid') || "NODE-" + Math.random().toString(36).substr(2, 4).toUpperCase();
    localStorage.setItem('k0x0_uid', myID);

    const salt = "OMEGA_STABLE_V16";

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const roomParam = params.get('room');

        if (roomParam) {
            currentTunnel = roomParam;
            const existing = tunnels.find(t => t.id === roomParam);
            if (!existing) {
                document.getElementById('vault-lock').style.display = 'flex';
            } else {
                masterKey = existing.key;
                initTunnel();
            }
        } else {
            const existingGlobal = tunnels.find(t => t.id === 'global');
            masterKey = existingGlobal ? existingGlobal.key : 'GLOBAL_DEF';
            initTunnel();
        }

        renderTunnelList();
        drawMatrix();
        setupSocketListeners();
    };

    function initTunnel() {
        document.getElementById('vault-lock').style.display = 'none';
        
        // إشعار السيرفر بالانضمام للغرفة
        socket.emit('join', { room: currentTunnel, user: myID });

        const tunnelData = tunnels.find(t => t.id === currentTunnel);
        document.getElementById('current-tunnel-name').innerText = tunnelData ? tunnelData.name : currentTunnel;

        loadChatHistory();
        renderTunnelList();
    }

    function deriveKey(pass, room) {
        return CryptoJS.PBKDF2(pass, salt + room, { keySize: 256 / 32, iterations: 1000 }).toString();
    }

    function attemptAccess() {
        const pass = document.getElementById('vault-pass').value;
        if(!pass) return;

        if (currentTunnel.startsWith('K0X0_')) {
            const fingerprint = CryptoJS.SHA256(pass).toString().substr(0, 4).toUpperCase();
            if (currentTunnel.split('_')[1] !== fingerprint) {
                document.getElementById('auth-err-msg').style.display = 'block';
                return;
            }
        }

        masterKey = pass;
        if (!tunnels.find(t => t.id === currentTunnel)) {
            tunnels.push({id: currentTunnel, name: "Tunnel " + currentTunnel.substr(-4), key: masterKey});
            saveTunnels();
        }
        initTunnel();
    }

    function setupSocketListeners() {
        // تنظيف الأحداث لتجنب التكرار والتداخل
        socket.off('message');
        socket.off('typing');
        socket.off('history_response'); // مستمع خاص لاستقبال الأرشيف المعلق من السيرفر إذا كان مدعوماً

        socket.on('message', (data) => {
            // التحقق من أن الرسالة تنتمي للغرفة الحالية من خلال السيرفر لمنع تداخل الأنفاق
            if (data.room && data.room !== currentTunnel) return;

            const tunnelData = tunnels.find(t => t.id === currentTunnel);
            if(!tunnelData) return;

            try {
                const dKey = deriveKey(tunnelData.key, currentTunnel);
                
                // فك تشفير الرسالة
                const bytes = CryptoJS.AES.decrypt(data.msg, dKey);
                const text = bytes.toString(CryptoJS.enc.Utf8);

                // فك تشفير الهوية
                const uBytes = CryptoJS.AES.decrypt(data.user, dKey);
                const sender = uBytes.toString(CryptoJS.enc.Utf8);

                if (text && sender !== myID) {
                    pushMsg(sender, text, 'received', true);
                }
            } catch (e) { 
                console.error("Crypt-Error: Key Mismatch or Broken Signal Structure"); 
            }
        });

        socket.on('typing', (data) => { 
            if(data.room === currentTunnel && data.user !== myID) {
                document.getElementById('typing-indicator').style.opacity = data.isTyping ? "1" : "0"; 
            }
        });

        // في حال أرسل السيرفر مصفوفة الرسائل المعلقة أثناء تحديث المزامنة
        socket.on('history_response', (data) => {
            if (data.room === currentTunnel && data.messages) {
                const tunnelData = tunnels.find(t => t.id === currentTunnel);
                if(!tunnelData) return;
                
                const dKey = deriveKey(tunnelData.key, currentTunnel);
                data.messages.forEach(m => {
                    try {
                        const bytes = CryptoJS.AES.decrypt(m.msg, dKey);
                        const text = bytes.toString(CryptoJS.enc.Utf8);
                        const uBytes = CryptoJS.AES.decrypt(m.user, dKey);
                        const sender = uBytes.toString(CryptoJS.enc.Utf8);
                        
                        // فحص عدم تكرار الرسالة بالـ LocalStorage
                        const history = JSON.parse(localStorage.getItem(`hist_${currentTunnel}`)) || [];
                        const exists = history.some(h => h.msg === text && h.time === m.time);
                        
                        if (text && !exists) {
                            const type = (sender === myID) ? 'sent' : 'received';
                            pushMsg(sender, text, type, true);
                        }
                    } catch(e) {}
                });
            }
        });
    }

    function sendSignal() {
        const inp = document.getElementById('userInput');
        const text = inp.value.trim();
        if (!text || !masterKey) return;

        const dKey = deriveKey(masterKey, currentTunnel);
        const encMsg = CryptoJS.AES.encrypt(text, dKey).toString();
        const encUser = CryptoJS.AES.encrypt(myID, dKey).toString();

        // إرسال كائن كامل يتضمن اسم الغرفة (room) لكي يوجهها السيرفر بشكل صحيح
        socket.emit('message', { room: currentTunnel, msg: encMsg, user: encUser });
        pushMsg("أنت", text, 'sent', true);
        inp.value = "";
    }

    function pushMsg(user, msg, type, save = false) {
        const box = document.getElementById('chat-box');
        
        // التحقق من منع التكرار البصري الفوري
        if (save) {
            const currentHistory = JSON.parse(localStorage.getItem(`hist_${currentTunnel}`)) || [];
            if (currentHistory.length > 0 && currentHistory[currentHistory.length - 1].msg === msg && currentHistory[currentHistory.length - 1].user === user) {
                return; // منع تكرار نفس الرسالة مرتين بالخطأ
            }
        }

        const div = document.createElement('div');
        div.className = `msg ${type}`;

        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const content = msg.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:var(--accent)">$1</a>');

        div.innerHTML = `
            <strong>${user}</strong>
            <div>${content}</div>
            <div class="msg-meta">
                <span>${time}</span>
                ${type === 'sent' ? '<i class="fas fa-check-double" style="color:var(--accent)"></i>' : ''}
            </div>
        `;

        box.appendChild(div);
        box.scrollTop = box.scrollHeight;

        if (save) {
            const history = JSON.parse(localStorage.getItem(`hist_${currentTunnel}`)) || [];
            history.push({user, msg, type, time});
            localStorage.setItem(`hist_${currentTunnel}`, JSON.stringify(history.slice(-100)));
        }
    }

    function loadChatHistory() {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        const history = JSON.parse(localStorage.getItem(`hist_${currentTunnel}`)) || [];
        history.forEach(h => pushMsg(h.user, h.msg, h.type, false));
    }

    function renderTunnelList() {
        const container = document.getElementById('tunnels-container');
        container.innerHTML = "";
        tunnels.forEach(t => {
            const div = document.createElement('div');
            div.className = `tunnel-item ${t.id === currentTunnel ? 'active' : ''}`;
            div.onclick = () => switchTunnel(t.id);
            div.innerHTML = `
                <span class="name">${t.name}</span>
                <span class="id">${t.id === 'global' ? 'PUBLIC NODE' : 'ENCRYPTED: ' + t.id.substr(0,10) + '...'}</span>
            `;
            container.appendChild(div);
        });
    }

    function switchTunnel(id) {
        if (id === currentTunnel) return;
        window.location.search = `?room=${id}`;
    }

    function createNewTunnel() {
        const name = prompt("اسم النفق (اختياري):") || "نفق خاص";
        const pass = prompt("أدخل مفتاح التشفير الأساسي (Master Key):");
        if(!pass) return;

        const fingerprint = CryptoJS.SHA256(pass).toString().substr(0, 4).toUpperCase();
        const newID = "K0X0_" + fingerprint + "_" + Math.random().toString(36).substr(2, 6).toUpperCase();

        tunnels.push({id: newID, name: name, key: pass});
        saveTunnels();
        switchTunnel(newID);
    }

    function refreshSync() {
        const btn = document.getElementById('sync-btn-icon').querySelector('i');
        btn.style.transition = "transform 0.5s ease";
        btn.style.transform = "rotate(360deg)";
        
        // 1. إعادة البناء المحلي للمحادثة
        loadChatHistory();
        
        // 2. إعادة إرسال طلب الانضمام لإنعاش النفق واسترجاع المعلقات
        socket.emit('join', { room: currentTunnel, user: myID });
        
        // 3. إرسال حدث مخصص لطلب السجل التاريخي المعلق من السيرفر (إذا كان السيرفر يدعم الحفظ المؤقت)
        socket.emit('request_history', { room: currentTunnel, user: myID });
        
        setTimeout(() => {
            btn.style.transform = "rotate(0deg)";
        }, 500);
    }

    function saveTunnels() { localStorage.setItem('k0x0_tunnels', JSON.stringify(tunnels)); }
    function clearCurrentChat() { if(confirm("مسح سجل هذا النفق فقط؟")) { localStorage.removeItem(`hist_${currentTunnel}`); loadChatHistory(); } }
    function panicDestruct() { if(confirm("سيتم تدمير كافة الأنفاق والرسائل والمفاتيح. هل أنت متأكد؟")) { localStorage.clear(); window.location.search = ""; } }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function copyTunnelURL() { navigator.clipboard.writeText(window.location.href); alert("تم نسخ رابط النفق المشفر!"); }

    // Typing Logic
    let typingTimer;
    document.getElementById('userInput').addEventListener('input', () => {
        socket.emit('typing', { room: currentTunnel, user: myID, isTyping: true });
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => socket.emit('typing', { room: currentTunnel, user: myID, isTyping: false }), 2000);
    });

    document.getElementById('sendBtn').onclick = sendSignal;
    document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') sendSignal(); };

    function drawMatrix() {
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/20)).fill(1);
        setInterval(() => {
            ctx.fillStyle = "rgba(1, 4, 9, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00f2ff"; ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                const text = String.fromCharCode(0x30A0 + Math.random() * 33);
                ctx.fillText(text, i*20, y*20);
                if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }, 50);
    }
</script>
</body>
</html>
