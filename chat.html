<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KERNEL-0X0 | OMEGA V17.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #010409;
            --panel-dark: rgba(13, 17, 23, 0.98);
            --accent: #00f2ff;
            --danger: #ff003c;
            --success: #00ff88;
            --text-main: #e6edf3;
            --sent-bg: rgba(0, 242, 255, 0.08);
            --recv-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(48, 54, 61, 0.7);
            --sidebar-w: 300px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: var(--text-main); }

        #matrix-canvas { position: fixed; top: 0; left: 0; opacity: 0.1; z-index: -1; pointer-events: none; }

        /* Lock Screen */
        #vault-lock { position: fixed; inset: 0; background: var(--bg-dark); z-index: 10000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); transition: 0.3s; }
        .lock-box { background: var(--panel-dark); padding: 30px; border-radius: 20px; border: 1px solid var(--accent); text-align: center; width: 90%; max-width: 350px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); }

        .app-container { display: flex; height: 100vh; width: 100vw; position: relative; }
        
        /* Sidebar */
        .chat-nav { 
            width: var(--sidebar-w); 
            background: var(--panel-dark); 
            border-left: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 5000; 
        }
        
        .tunnel-list { flex: 1; overflow-y: auto; padding: 10px; }
        .tunnel-item { padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; }
        .tunnel-item:hover, .tunnel-item.active { border-color: var(--accent); background: rgba(0, 242, 255, 0.05); }

        .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

        /* Header */
        header { padding: 10px 15px; background: rgba(1, 4, 9, 0.8); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); z-index: 100; }

        /* Messages area */
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 15px; font-size: 0.9rem; border: 1px solid var(--border); animation: fadeIn 0.2s ease; position: relative; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.sent { align-self: flex-start; background: var(--sent-bg); border-color: var(--accent); border-bottom-left-radius: 2px; }
        .msg.received { align-self: flex-end; background: var(--recv-bg); border-bottom-right-radius: 2px; }
        .msg-info { display: flex; justify-content: space-between; font-size: 0.6rem; color: var(--accent); margin-bottom: 4px; font-family: 'Fira Code'; }

        /* Input area */
        .input-area { padding: 15px; background: var(--bg-dark); }
        .input-wrapper { display: flex; gap: 8px; background: rgba(255,255,255,0.03); padding: 5px 10px; border-radius: 15px; border: 1px solid var(--border); }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: #fff; padding: 10px; outline: none; }

        .btn-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); color: var(--accent); border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .btn-icon:hover { background: var(--accent); color: #000; }
        .btn-send { background: var(--accent); color: #000; border: none; }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .chat-nav { position: absolute; right: 0; top: 0; bottom: 0; transform: translateX(100%); width: 80%; }
            .chat-nav.open { transform: translateX(0); box-shadow: -10px 0 30px #000; }
        }

        .status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block; margin-left: 5px; box-shadow: 0 0 8px var(--success); }
        .status-offline { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        
        .theme-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; }
        .theme-dot { height: 25px; border-radius: 5px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div id="vault-lock">
    <div class="lock-box">
        <i class="fas fa-terminal" style="font-size: 2rem; color: var(--accent); margin-bottom: 15px;"></i>
        <h3 style="margin:0; font-family: 'Fira Code';">KERNEL-0X0 ACCESS</h3>
        <p style="font-size: 0.6rem; color: #666; margin-bottom: 15px;">ENCRYPTION LAYER ACTIVE</p>
        <input type="password" id="vault-pass" placeholder="Enter Tunnel Key..." style="width:100%; padding:12px; background:#000; border:1px solid var(--border); border-radius:8px; color:var(--accent); text-align:center; margin-bottom:15px; outline:none;">
        <button onclick="attemptAccess()" style="width:100%; padding:12px; background:var(--accent); color:#000; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">AUTH_NODE</button>
    </div>
</div>

<div class="app-container">
    <aside class="chat-nav" id="sidebar">
        <div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:0.8rem; font-weight:bold; color:var(--accent);">TUNNELS_OS</span>
            <i class="fas fa-times" onclick="toggleSidebar()" style="cursor:pointer;"></i>
        </div>
        <div class="tunnel-list" id="tunnels-container"></div>
        <div class="theme-grid" id="theme-grid"></div>
        <div style="padding:15px; display:flex; flex-direction:column; gap:8px;">
            <button onclick="createNewTunnel()" class="btn-icon" style="width:100%; border-radius:8px;">+ نفق جديد</button>
            <button onclick="panicDestruct()" style="width:100%; padding:10px; background:rgba(255,0,60,0.1); color:var(--danger); border:1px solid var(--danger); border-radius:8px; cursor:pointer;">تدمير البيانات</button>
        </div>
    </aside>

    <main class="chat-main">
        <header>
            <div style="display:flex; align-items:center; gap:12px;">
                <button onclick="toggleSidebar()" class="btn-icon"><i class="fas fa-bars"></i></button>
                <div>
                    <div id="current-tunnel-name" style="font-weight:bold; font-size:0.9rem;">MAIN_NODE</div>
                    <div style="font-size:0.5rem; color:var(--accent);">
                        <span id="conn-status" class="status-dot"></span> <span id="protocol-info">SECURE_LINK</span>
                    </div>
                </div>
            </div>
            <div style="display:flex; gap:8px;">
                <button onclick="copyTunnelURL()" class="btn-icon"><i class="fas fa-share-nodes"></i></button>
                <button onclick="clearCurrentChat()" class="btn-icon" style="color:var(--danger)"><i class="fas fa-eraser"></i></button>
            </div>
        </header>

        <div class="messages" id="chat-box"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Signal text..." autocomplete="off">
                <button onclick="sendSignal()" class="btn-icon btn-send"><i class="fas fa-bolt"></i></button>
            </div>
        </div>
    </main>
</div>

<script>
    // Configuration
    const socketURL = "wss://vip-arm-fixed.onrender.com/chat";
    let socket;
    let currentTunnelID = new URLSearchParams(window.location.search).get('room') || 'Global_Node';
    let tunnels = JSON.parse(localStorage.getItem('k0x0_tunnels')) || [{id: 'Global_Node', name: 'القناة العامة', key: 'KERNEL_DEFAULT'}];
    const myUID = localStorage.getItem('k0x0_uid') || "NODE-" + Math.random().toString(16).slice(2,6).toUpperCase();
    localStorage.setItem('k0x0_uid', myUID);

    function initWebSocket() {
        if(socket) socket.close();
        socket = new WebSocket(`${socketURL}?room=${currentTunnelID}`);
        socket.onopen = () => {
            document.getElementById('conn-status').classList.remove('status-offline');
            document.getElementById('protocol-info').innerText = "AES_256_ACTIVE";
        };
        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if(data.sender !== myUID) processIncoming(data);
        };
        socket.onclose = () => {
            document.getElementById('conn-status').classList.add('status-offline');
            setTimeout(initWebSocket, 3000);
        };
    }

    function processIncoming(data) {
        const tunnel = tunnels.find(t => t.id === currentTunnelID);
        try {
            const bytes = CryptoJS.AES.decrypt(data.encText, tunnel.key);
            const dec = bytes.toString(CryptoJS.enc.Utf8);
            if(dec) {
                pushUI(dec, data.sender, data.time, false);
                saveMsg(data);
            }
        } catch(err) { console.error("Decryption failed"); }
    }

    function sendSignal() {
        const inp = document.getElementById('userInput');
        const txt = inp.value.trim();
        if(!txt) return;

        const tunnel = tunnels.find(t => t.id === currentTunnelID);
        const encrypted = CryptoJS.AES.encrypt(txt, tunnel.key).toString();
        const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        const payload = { encText: encrypted, sender: myUID, time: time, room: currentTunnelID };

        if(socket && socket.readyState === 1) {
            socket.send(JSON.stringify(payload));
            pushUI(txt, myUID, time, true);
            saveMsg(payload);
            inp.value = "";
        }
    }

    function pushUI(text, sender, time, isMe) {
        const box = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.className = `msg ${isMe ? 'sent' : 'received'}`;
        d.innerHTML = `<div class="msg-info"><span>${sender}</span><span>${time}</span></div><div>${text}</div>`;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    function saveMsg(data) {
        let h = JSON.parse(localStorage.getItem('hist_'+currentTunnelID)) || [];
        h.push(data);
        if(h.length > 50) h.shift();
        localStorage.setItem('hist_'+currentTunnelID, JSON.stringify(h));
    }

    function loadHistory() {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        const tunnel = tunnels.find(t => t.id === currentTunnelID);
        const h = JSON.parse(localStorage.getItem('hist_'+currentTunnelID)) || [];
        h.forEach(m => {
            try {
                const b = CryptoJS.AES.decrypt(m.encText, tunnel.key);
                pushUI(b.toString(CryptoJS.enc.Utf8), m.sender, m.time, m.sender === myUID);
            } catch(e) {}
        });
    }

    function attemptAccess() {
        const p = document.getElementById('vault-pass').value;
        const t = tunnels.find(x => x.id === currentTunnelID);
        if(t && t.key === p) {
            sessionStorage.setItem('unlock_'+currentTunnelID, '1');
            document.getElementById('vault-lock').style.display = 'none';
            initWebSocket();
            loadHistory();
        } else { alert("ACCESS_DENIED"); }
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    
    function createNewTunnel() {
        const n = prompt("Name:");
        const k = prompt("Key:");
        if(n && k) {
            const id = "NODE_" + Math.random().toString(36).slice(2,7).toUpperCase();
            tunnels.push({id, name:n, key:k});
            localStorage.setItem('k0x0_tunnels', JSON.stringify(tunnels));
            location.href = "?room=" + id;
        }
    }

    function copyTunnelURL() {
        navigator.clipboard.writeText(location.href);
        alert("تم نسخ الرابط");
    }

    function clearCurrentChat() {
        localStorage.removeItem('hist_'+currentTunnelID);
        location.reload();
    }

    function panicDestruct() {
        if(confirm("تدمير شامل؟")) { localStorage.clear(); location.href = location.pathname; }
    }

    // Matrix Lite
    function drawMatrix() {
        const c = document.getElementById('matrix-canvas');
        const ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const drops = Array(Math.floor(c.width/20)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(1, 4, 9, 0.1)";
            ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = "#00f2ff";
            drops.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(Math.random()*128), i*20, y*20);
                if(y*20 > c.height && Math.random() > 0.98) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);
    }

    window.onload = () => {
        drawMatrix();
        const container = document.getElementById('tunnels-container');
        tunnels.forEach(t => {
            const d = document.createElement('div');
            d.className = `tunnel-item ${t.id === currentTunnelID ? 'active' : ''}`;
            d.innerHTML = `<div style="font-size:0.7rem; color:var(--accent)">${t.id}</div><div style="font-weight:bold">${t.name}</div>`;
            d.onclick = () => location.href = "?room=" + t.id;
            container.appendChild(d);
        });

        if(currentTunnelID === 'Global_Node' || sessionStorage.getItem('unlock_'+currentTunnelID)) {
            document.getElementById('vault-lock').style.display = 'none';
            initWebSocket();
            loadHistory();
        }
    };
</script>
</body>
</html>
