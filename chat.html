<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KERNEL-0X0 | OMEGA V17.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #010409;
            --panel-dark: rgba(13, 17, 23, 0.9);
            --accent: #00f2ff;
            --danger: #ff003c;
            --success: #00ff88;
            --text-main: #e6edf3;
            --sent-bg: rgba(0, 242, 255, 0.1);
            --recv-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(48, 54, 61, 0.8);
            --sidebar-w: 320px;
            --glass: blur(20px) saturate(180%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; scrollbar-width: thin; scrollbar-color: var(--accent) transparent; }
        body, html { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background: var(--bg-dark); font-family: 'Cairo', sans-serif; color: var(--text-main); position: fixed; width: 100%; transition: background 0.5s ease; background-size: cover; background-position: center; }

        #matrix-canvas { position: fixed; top: 0; left: 0; opacity: 0.2; z-index: 0; pointer-events: none; }

        /* Secure Overlay */
        #vault-lock { position: fixed; top:0; left:0; width:100%; height:100dvh; background: var(--bg-dark); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(30px); }
        .lock-box { background: var(--panel-dark); padding: 40px; border-radius: 30px; border: 1px solid var(--accent); text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); animation: scaleUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes scaleUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .app-container { display: flex; height: 100dvh; width: 100vw; position: relative; z-index: 1; }
        
        /* Sidebar Enhanced */
        .chat-nav { width: var(--sidebar-w); background: var(--panel-dark); border-left: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; backdrop-filter: var(--glass); }
        .tunnel-list { flex: 1; overflow-y: auto; padding: 15px; }
        .tunnel-item { padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .tunnel-item:hover { border-color: var(--accent); background: rgba(0, 242, 255, 0.08); transform: translateX(-5px); }
        .tunnel-item.active { border-right: 5px solid var(--accent); background: rgba(0, 242, 255, 0.12); }
        
        /* Themes Section */
        .theme-section { padding: 20px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        .theme-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .theme-dot { width: 35px; height: 35px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; position: relative; }
        .theme-dot:hover { transform: scale(1.1) rotate(10deg); border-color: #fff; }

        .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: rgba(1, 4, 9, 0.2); }

        /* Messages */
        .messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 14px 20px; border-radius: 20px; font-size: 0.95rem; border: 1px solid var(--border); position: relative; animation: slideIn 0.3s ease; line-height: 1.6; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .msg.sent { align-self: flex-start; background: var(--sent-bg); border-bottom-left-radius: 4px; border-color: var(--accent); box-shadow: 0 4px 15px rgba(0,242,255,0.05); }
        .msg.received { align-self: flex-end; background: var(--recv-bg); border-bottom-right-radius: 4px; }
        .msg-info { display: flex; justify-content: space-between; font-size: 0.65rem; font-family: 'Fira Code'; margin-bottom: 6px; color: var(--accent); }

        /* Input Area */
        .input-area { padding: 25px; background: linear-gradient(to top, var(--bg-dark), transparent); }
        .input-wrapper { display: flex; gap: 12px; align-items: center; background: rgba(13, 17, 23, 0.8); padding: 10px 20px; border-radius: 25px; border: 1px solid var(--border); backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; padding: 10px; font-size: 1rem; outline: none; }

        .btn-icon { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); color: var(--accent); border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .btn-icon:hover { background: var(--accent); color: #000; transform: scale(1.1); box-shadow: 0 0 15px var(--accent); }
        .btn-send { background: var(--accent); color: #000; border: none; }

        /* Responsive */
        @media (max-width: 768px) {
            .chat-nav { position: absolute; right: -100%; height: 100dvh; width: 85%; }
            .chat-nav.open { right: 0; box-shadow: -20px 0 50px rgba(0,0,0,0.5); }
        }

        .status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block; margin-left: 8px; box-shadow: 0 0 10px var(--success); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body oncontextmenu="return false;">

<canvas id="matrix-canvas"></canvas>

<!-- Vault Lock Screen -->
<div id="vault-lock">
    <div class="lock-box">
        <i class="fas fa-shield-halved" style="font-size: 3.5rem; color: var(--accent); margin-bottom: 20px;"></i>
        <h2 style="font-family: 'Fira Code'; margin: 0; letter-spacing: 3px;">KERNEL-0X0</h2>
        <p style="color: #8b949e; font-size: 0.75rem; margin-bottom: 30px;">OMEGA V17.0 | ENCRYPTED NODE ACCESS</p>
        <input type="password" id="vault-pass" placeholder="أدخل مفتاح النفق..." style="width: 100%; padding: 18px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 15px; color: var(--accent); text-align: center; margin-bottom: 20px; outline: none; font-size: 1.1rem;">
        <button onclick="attemptAccess()" style="width: 100%; padding: 18px; background: var(--accent); color: #000; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; box-shadow: 0 0 25px rgba(0,242,255,0.4); font-size: 1rem;">فتح بوابة التشفير</button>
    </div>
</div>

<div class="app-container">
    <!-- Sidebar -->
    <aside class="chat-nav" id="sidebar">
        <div style="padding: 25px; border-bottom: 1px solid var(--border);">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-family: 'Fira Code'; color: var(--accent); font-weight: bold; font-size: 1.1rem;">TUNNEL MANAGER</span>
                <button onclick="toggleSidebar()" class="btn-icon" style="width: 35px; height: 35px;"><i class="fas fa-xmark"></i></button>
            </div>
        </div>
        
        <div class="tunnel-list" id="tunnels-container"></div>

        <!-- Personalization -->
        <div class="theme-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span style="font-size: 0.85rem; font-weight: bold; color: var(--accent);">مصفوفة الألوان (20 ثيم)</span>
                <i class="fas fa-palette" style="font-size: 0.8rem; opacity: 0.5;"></i>
            </div>
            <div class="theme-grid" id="theme-grid"></div>
            <div style="margin-top: 20px;">
                <button onclick="document.getElementById('bg-upload').click()" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: white; cursor: pointer; font-size: 0.8rem; transition: 0.3s;">
                    <i class="fas fa-cloud-arrow-up" style="margin-left: 8px;"></i> تخصيص خلفية النفق
                </button>
                <input type="file" id="bg-upload" hidden accept="image/*" onchange="uploadBg(this)">
            </div>
        </div>

        <div style="padding: 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px;">
            <button onclick="createNewTunnel()" style="width: 100%; padding: 15px; background: var(--accent); color: black; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <i class="fas fa-plus-square"></i> نفق تشفير جديد
            </button>
            <button onclick="panicDestruct()" style="width: 100%; padding: 12px; background: rgba(255,0,60,0.1); color: var(--danger); border: 1px solid var(--danger); border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 0.85rem;">
                <i class="fas fa-skull-crossbones" style="margin-left: 8px;"></i> تدمير البروتوكول الشامل
            </button>
        </div>
    </aside>

    <!-- Main Chat -->
    <main class="chat-main">
        <header style="padding: 15px 25px; background: rgba(0,0,0,0.4); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); backdrop-filter: blur(10px);">
            <div style="display: flex; align-items: center; gap: 20px;">
                <button onclick="toggleSidebar()" class="btn-icon"><i class="fas fa-bars-staggered"></i></button>
                <div>
                    <div id="current-tunnel-name" style="font-weight: bold; font-size: 1.1rem; letter-spacing: 1px;">SIGNAL_X</div>
                    <div style="display: flex; align-items: center; font-size: 0.65rem; color: var(--accent); font-family: 'Fira Code'; margin-top: 4px;">
                        <span class="status-dot"></span>
                        AES_256_GCM | NODE_STABLE
                    </div>
                </div>
            </div>
            <div style="display: flex; gap: 12px;">
                <button title="مزامنة فورية" onclick="refreshSync()" class="btn-icon"><i class="fas fa-sync-alt"></i></button>
                <button title="نسخ الرابط" onclick="copyTunnelURL()" class="btn-icon"><i class="fas fa-link"></i></button>
                <button title="مسح السجل" onclick="clearCurrentChat()" class="btn-icon" style="color: var(--danger); border-color: rgba(255,0,60,0.3);"><i class="fas fa-eraser"></i></button>
            </div>
        </header>

        <div class="messages" id="chat-box"></div>
        <div id="typing-indicator" style="padding: 10px 30px; font-size: 0.75rem; color: var(--accent); opacity: 0; font-family: 'Fira Code';">NODE_REMOTE IS ENCRYPTING...</div>

        <div class="input-area">
            <div class="input-wrapper">
                <button class="btn-icon" style="border:none; background:none;"><i class="fas fa-paperclip"></i></button>
                <input type="text" id="userInput" placeholder="أرسل رسالة مشفرة عبر النفق..." autocomplete="off">
                <button id="sendBtn" class="btn-icon btn-send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>
</div>

<script>
    // --- 20 Enhanced Themes ---
    const themes = [
        { name: 'Matrix', bg: '#010409', acc: '#00f2ff', pnl: 'rgba(13, 17, 23, 0.9)' },
        { name: 'Blood', bg: '#0d0000', acc: '#ff4d4d', pnl: 'rgba(30, 5, 5, 0.9)' },
        { name: 'Toxic', bg: '#030803', acc: '#39ff14', pnl: 'rgba(10, 25, 10, 0.9)' },
        { name: 'Cyber', bg: '#0d001a', acc: '#ff00ff', pnl: 'rgba(30, 0, 50, 0.9)' },
        { name: 'Deep', bg: '#000814', acc: '#00b4d8', pnl: 'rgba(0, 20, 40, 0.9)' },
        { name: 'Gold', bg: '#0f0f0f', acc: '#ffbe0b', pnl: 'rgba(30, 30, 10, 0.9)' },
        { name: 'Ghost', bg: '#ffffff', acc: '#2d3436', pnl: 'rgba(240, 240, 240, 0.9)', txt: '#2d3436' },
        { name: 'Violet', bg: '#1a1a2e', acc: '#e94560', pnl: 'rgba(22, 33, 62, 0.9)' },
        { name: 'Emerald', bg: '#001a1a', acc: '#2ec4b6', pnl: 'rgba(1, 34, 34, 0.9)' },
        { name: 'Orange', bg: '#1c0d00', acc: '#fb8500', pnl: 'rgba(40, 20, 0, 0.9)' },
        { name: 'Sakura', bg: '#2d1b24', acc: '#ffafcc', pnl: 'rgba(60, 30, 45, 0.9)' },
        { name: 'Arctic', bg: '#e0f2f1', acc: '#00796b', pnl: 'rgba(255,255,255,0.8)', txt: '#004d40' },
        { name: 'Lavender', bg: '#120d16', acc: '#bd93f9', pnl: 'rgba(25, 20, 35, 0.9)' },
        { name: 'Carbon', bg: '#000000', acc: '#ffffff', pnl: 'rgba(20, 20, 20, 0.9)' },
        { name: 'Sunset', bg: '#1a0f0f', acc: '#ff5400', pnl: 'rgba(45, 20, 20, 0.9)' },
        { name: 'Ocean', bg: '#011627', acc: '#4cc9f0', pnl: 'rgba(1, 30, 50, 0.9)' },
        { name: 'Coffee', bg: '#1b1212', acc: '#d4a373', pnl: 'rgba(45, 30, 30, 0.9)' },
        { name: 'Mint', bg: '#f8f9fa', acc: '#2b9348', pnl: 'rgba(255,255,255,0.9)', txt: '#1b4332' },
        { name: 'Midnight', bg: '#000000', acc: '#3a86ff', pnl: 'rgba(10, 10, 30, 0.9)' },
        { name: 'Neon', bg: '#050505', acc: '#00ff88', pnl: 'rgba(20, 30, 25, 0.9)' }
    ];

    // --- Core Logic ---
    let currentTunnelID = new URLSearchParams(window.location.search).get('room') || 'Global_Node';
    let tunnels = JSON.parse(localStorage.getItem('k0x0_tunnels')) || [{id: 'Global_Node', name: 'Global Signal', key: 'KERNEL_DEFAULT'}];
    const myUID = localStorage.getItem('k0x0_uid') || "NODE-" + Math.floor(Math.random()*10000);
    localStorage.setItem('k0x0_uid', myUID);

    // Sync Channel (Real-time tab communication)
    const channel = new BroadcastChannel('k0x0_sync_' + currentTunnelID);

    window.onload = () => {
        initThemes();
        loadPrefs();
        renderTunnelList();
        drawMatrix();
        
        const activeTunnel = tunnels.find(t => t.id === currentTunnelID);
        if (currentTunnelID !== 'Global_Node' && (!activeTunnel || !sessionStorage.getItem('unlocked_' + currentTunnelID))) {
            document.getElementById('vault-lock').style.display = 'flex';
        } else {
            document.getElementById('vault-lock').style.display = 'none';
            loadChatHistory();
        }

        // Listen for new messages
        channel.onmessage = (event) => {
            pushMsgToUI(event.data.msg, event.data.sender, event.data.time, false);
        };
    };

    // --- Authentication ---
    function attemptAccess() {
        const pass = document.getElementById('vault-pass').value;
        if(!pass) return;
        
        const finger = CryptoJS.SHA256(pass).toString().substr(0, 8);
        const tunnel = tunnels.find(t => t.id === currentTunnelID);

        if (tunnel && tunnel.key !== pass) {
            alert("خطأ: بصمة المفتاح غير متطابقة!");
            return;
        }

        sessionStorage.setItem('unlocked_' + currentTunnelID, 'true');
        document.getElementById('vault-lock').style.display = 'none';
        loadChatHistory();
    }

    // --- Tunnel Management ---
    function createNewTunnel() {
        const name = prompt("اسم النفق الجديد:");
        if(!name) return;
        const key = prompt("تعيين مفتاح التشفير (Master Key):");
        if(!key) return;

        const id = "K0X0_" + Math.random().toString(36).substr(2, 6).toUpperCase();
        tunnels.push({id, name, key});
        localStorage.setItem('k0x0_tunnels', JSON.stringify(tunnels));
        window.location.href = `?room=${id}`;
    }

    function renderTunnelList() {
        const container = document.getElementById('tunnels-container');
        container.innerHTML = "";
        tunnels.forEach(t => {
            const div = document.createElement('div');
            div.className = `tunnel-item ${t.id === currentTunnelID ? 'active' : ''}`;
            div.onclick = () => window.location.href = `?room=${t.id}`;
            div.innerHTML = `
                <div class="msg-info"><span>${t.id}</span><i class="fas fa-lock"></i></div>
                <div style="font-weight:bold; color:var(--text-main)">${t.name}</div>
            `;
            container.appendChild(div);
        });
        document.getElementById('current-tunnel-name').innerText = tunnels.find(t => t.id === currentTunnelID).name;
    }

    // --- Messaging Engine ---
    document.getElementById('sendBtn').onclick = sendSignal;
    document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') sendSignal(); };

    function sendSignal() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        // Encrypt & Store
        const tunnel = tunnels.find(t => t.id === currentTunnelID);
        const encrypted = CryptoJS.AES.encrypt(text, tunnel.key).toString();
        
        saveMsgToLocal(encrypted, myUID, time);
        pushMsgToUI(text, myUID, time, true);
        
        // Broadcast to other tabs
        channel.postMessage({ msg: text, sender: myUID, time: time });

        input.value = "";
    }

    function pushMsgToUI(text, sender, time, isSent) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${isSent ? 'sent' : 'received'}`;
        div.innerHTML = `
            <div class="msg-info">
                <span>${sender === myUID ? 'YOU' : 'REMOTE_NODE'}</span>
                <span>${time}</span>
            </div>
            <div class="msg-content">${text}</div>
            <i class="fas fa-check-double" style="font-size:0.6rem; position:absolute; bottom:5px; left:10px; opacity:0.5"></i>
        `;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function saveMsgToLocal(encText, sender, time) {
        let history = JSON.parse(localStorage.getItem('hist_' + currentTunnelID)) || [];
        history.push({encText, sender, time});
        localStorage.setItem('hist_' + currentTunnelID, JSON.stringify(history));
    }

    function loadChatHistory() {
        const tunnel = tunnels.find(t => t.id === currentTunnelID);
        const history = JSON.parse(localStorage.getItem('hist_' + currentTunnelID)) || [];
        document.getElementById('chat-box').innerHTML = "";
        history.forEach(data => {
            const bytes = CryptoJS.AES.decrypt(data.encText, tunnel.key);
            const decrypted = bytes.toString(CryptoJS.enc.Utf8);
            pushMsgToUI(decrypted, data.sender, data.time, data.sender === myUID);
        });
    }

    // --- Utility Features ---
    function clearCurrentChat() {
        if(confirm("سيتم حذف السجل المشفر لهذا النفق نهائياً. هل أنت متأكد؟")) {
            localStorage.removeItem('hist_' + currentTunnelID);
            location.reload();
        }
    }

    function panicDestruct() {
        if(confirm("تحذير: سيتم تدمير جميع الأنفاق، المفاتيح، والرسائل. لا يمكن التراجع!")) {
            localStorage.clear();
            window.location.href = window.location.pathname;
        }
    }

    function refreshSync() {
        const btn = document.querySelector('button[onclick="refreshSync()"] i');
        btn.classList.add('fa-spin');
        setTimeout(() => {
            loadChatHistory();
            btn.classList.remove('fa-spin');
        }, 1000);
    }

    function copyTunnelURL() {
        navigator.clipboard.writeText(window.location.href);
        alert("تم نسخ رابط النفق بنجاح!");
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    // --- Visuals & Themes ---
    function initThemes() {
        const grid = document.getElementById('theme-grid');
        themes.forEach(t => {
            const dot = document.createElement('div');
            dot.className = 'theme-dot';
            dot.style.background = `linear-gradient(135deg, ${t.bg} 50%, ${t.acc} 50%)`;
            dot.onclick = () => applyTheme(t);
            grid.appendChild(dot);
        });
    }

    function applyTheme(t) {
        const root = document.documentElement;
        root.style.setProperty('--bg-dark', t.bg);
        root.style.setProperty('--accent', t.acc);
        root.style.setProperty('--panel-dark', t.pnl);
        root.style.setProperty('--text-main', t.txt || '#e6edf3');
        root.style.setProperty('--sent-bg', t.acc + '22');
        document.body.style.backgroundImage = '';
        localStorage.setItem('k0x0_theme', JSON.stringify(t));
    }

    function uploadBg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.body.style.backgroundImage = `url(${e.target.result})`;
                localStorage.setItem('k0x0_custom_bg', e.target.result);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function loadPrefs() {
        const savedTheme = localStorage.getItem('k0x0_theme');
        if(savedTheme) applyTheme(JSON.parse(savedTheme));
        const savedBg = localStorage.getItem('k0x0_custom_bg');
        if(savedBg) document.body.style.backgroundImage = `url(${savedBg})`;
    }

    function drawMatrix() {
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/20)).fill(1);
        setInterval(() => {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
            ctx.font = "15px 'Fira Code'";
            drops.forEach((y, i) => {
                const text = String.fromCharCode(0x30A0 + Math.random() * 33);
                ctx.fillText(text, i*25, y*25);
                if(y*25 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }, 50);
    }
</script>
</body>
</html>
