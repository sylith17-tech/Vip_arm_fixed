<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP_ARM | Kernel-0x0 Private Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0a0f1a;
            --panel-dark: #111827;
            --accent: #00f2ff;
            --text-main: #e5e7eb;
            --text-dim: #9ca3af;
            --sent-bg: #1e3a8a;
            --recv-bg: #374151;
            --glass: rgba(17, 24, 39, 0.8);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        
        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Cairo', sans-serif; 
            height: 100vh; 
            margin: 0; 
            display: flex; 
            overflow: hidden;
        }

        /* مصفوفة الخلفية الهادئة */
        #matrix-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.05;
            pointer-events: none;
            z-index: 0;
        }

        /* القائمة الجانبية المطورة */
        .chat-nav { 
            width: 280px; 
            background: var(--panel-dark); 
            border-left: 1px solid #1f2937; 
            display: flex; 
            flex-direction: column; 
            z-index: 10;
        }

        .nav-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #1f2937; }
        .nav-header h3 { font-family: 'Fira Code', monospace; margin: 0; font-size: 1.5rem; }

        .nav-buttons { padding: 20px; display: grid; gap: 12px; }
        .nav-btn {
            background: #1f2937;
            color: var(--text-main);
            border: 1px solid transparent;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Cairo';
        }
        .nav-btn:hover { border-color: var(--accent); background: #2d3748; }
        .nav-btn.primary { background: var(--accent); color: #000; font-weight: bold; }

        /* منطقة الدردشة الرئيسية */
        .chat-main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            z-index: 5;
            background: radial-gradient(circle at top, #111b2d 0%, #0a0f1a 100%);
        }

        .chat-header { 
            padding: 15px 25px; 
            background: var(--glass); 
            backdrop-filter: blur(10px);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #1f2937;
        }

        .messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        /* شكل الرسائل المريح */
        .msg { 
            max-width: 75%; 
            padding: 12px 18px; 
            border-radius: 18px; 
            font-size: 0.95rem; 
            line-height: 1.5;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .msg.sent { 
            align-self: flex-start; 
            background: var(--sent-bg); 
            color: white;
            border-bottom-left-radius: 4px;
        }

        .msg.received { 
            align-self: flex-end; 
            background: var(--recv-bg); 
            color: var(--text-main);
            border-bottom-right-radius: 4px;
        }

        .msg strong { display: block; font-size: 0.7rem; margin-bottom: 5px; opacity: 0.7; font-family: 'Fira Code'; }

        /* منطقة الإدخال */
        .input-area { 
            padding: 20px 30px; 
            background: var(--glass); 
            display: flex; 
            gap: 15px; 
            align-items: center;
            border-top: 1px solid #1f2937;
        }

        .input-wrapper {
            flex: 1;
            background: #1f2937;
            border-radius: 30px;
            padding: 5px 20px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
        }
        .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        .input-wrapper input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            padding: 10px; 
            outline: none; 
            font-family: 'Cairo';
        }

        .btn-icon { color: var(--text-dim); cursor: pointer; font-size: 1.2rem; background: none; border: none; }
        .btn-icon:hover { color: var(--accent); transform: translateY(-2px); }

        /* الأنظمة الفرعية */
        .system-footer { 
            height: 30px; 
            background: #000; 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            font-size: 11px; 
            color: var(--accent); 
            font-family: 'Fira Code', monospace;
            gap: 20px;
        }

        /* المودال */
        .modal-invite {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--panel-dark); padding: 30px; border-radius: 24px;
            border: 1px solid var(--accent); display: none; z-index: 1000;
            box-shadow: 0 0 40px rgba(0,0,0,0.8); text-align: center; width: 90%; max-width: 400px;
        }

        .status-online { color: #10b981; }
        
        @media (max-width: 768px) { .chat-nav { width: 0; position: absolute; height: 100%; } }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div class="chat-nav" id="sidebar">
    <div class="nav-header">
        <h3><span style="color:var(--accent)">VIP</span>_ARM</h3>
        <small style="color:var(--text-dim)">Kernel-0x0 Console</small>
    </div>
    <div class="nav-buttons">
        <button class="nav-btn" onclick="joinGlobal()">
            الدردشة العالمية <i class="fas fa-globe-americas"></i>
        </button>
        <button class="nav-btn primary" onclick="createPrivateRoom()">
            غرفة خاصة جديدة <i class="fas fa-plus-shield"></i>
        </button>
    </div>
    <div style="margin-top: auto; padding: 20px; border-top: 1px solid #1f2937;">
        <div style="font-size: 0.8rem; display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-circle status-online" style="font-size: 8px;"></i>
            <span>Node: Active</span>
        </div>
    </div>
</div>

<div class="chat-main">
    <div class="chat-header">
        <div>
            <div id="room-name" style="font-weight: bold; font-size: 1.1rem; color: var(--accent);">جاري المزامنة...</div>
            <div id="encryption-status" style="font-size: 10px; font-family: 'Fira Code'; color: var(--text-dim);">AES-256-GCM SECURE</div>
        </div>
        <div style="display: flex; gap: 20px;">
            <button class="btn-icon" onclick="showInvite()" title="دعوة"><i class="fas fa-link"></i></button>
            <button class="btn-icon" onclick="clearMessages()" title="مسح"><i class="fas fa-trash"></i></button>
            <button class="btn-icon" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        </div>
    </div>

    <div class="messages" id="message-container">
        <!-- الرسائل تظهر هنا -->
    </div>

    <div class="input-area">
        <label class="btn-icon">
            <i class="fas fa-camera"></i>
            <input type="file" hidden id="fileInput" accept="image/*">
        </label>
        <div class="input-wrapper">
            <input type="text" id="msgInput" placeholder="أدخل رسالتك المشفرة..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="btn-icon" onclick="sendMessage()" style="color: var(--accent);"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="system-footer">
        <span><i class="fas fa-microchip"></i> CPU: <span id="cpu-val">0%</span></span>
        <span><i class="fas fa-memory"></i> RAM: <span id="ram-val">0.0GB</span></span>
        <span><i class="fas fa-terminal"></i> SESSION: <span id="session-id">---</span></span>
    </div>
</div>

<div class="modal-invite" id="inviteModal">
    <div style="font-size: 3rem; color: var(--accent); margin-bottom: 15px;"><i class="fas fa-shield-alt"></i></div>
    <h3 style="margin: 0 0 10px 0;">رابط النفق الخاص</h3>
    <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px;">أرسل هذا الرابط لصديقك لبدء محادثة مشفرة بنظام End-to-End</p>
    <div style="background: #000; padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 25px; border: 1px solid #1f2937;">
        <input type="text" id="inviteLink" readonly style="background:none; border:none; color:var(--accent); flex:1; font-family:'Fira Code'; font-size: 0.8rem;">
        <button onclick="copyLink()" style="background:none; border:none; color:white; cursor:pointer;"><i class="fas fa-copy"></i></button>
    </div>
    <button onclick="closeInvite()" style="width: 100%; padding: 12px; border-radius: 12px; border: none; background: #374151; color: white; cursor: pointer;">إغلاق</button>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io();
    let currentRoom = "global";
    const SECRET_KEY = "VIP_ARM_KERNEL_0x0";

    // مزامنة الاتصال مع السيرفر (حل مشكلة الصورة)
    socket.on('connect', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const room = urlParams.get('room');
        document.getElementById('session-id').innerText = socket.id.substr(0, 8).toUpperCase();
        
        if (room) {
            joinRoom(room);
        } else {
            joinGlobal();
        }
    });

    function joinRoom(roomId) {
        currentRoom = roomId;
        socket.emit('join', { room: roomId, user: "VIP_ARM" });
        document.getElementById('room-name').innerText = roomId === 'global' ? "الدردشة العالمية" : "نفق خاص: " + roomId;
        logSystem(`تم الربط بالنفق: ${roomId}`);
    }

    function joinGlobal() {
        if (window.location.search.includes('room=')) {
            window.history.pushState({}, '', window.location.pathname);
        }
        joinRoom('global');
    }

    function createPrivateRoom() {
        const roomId = "vip_" + Math.random().toString(36).substr(2, 6);
        window.history.pushState({}, '', `?room=${roomId}`);
        joinRoom(roomId);
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        if(!input.value) return;

        const encryptedMsg = CryptoJS.AES.encrypt(input.value, SECRET_KEY).toString();
        socket.emit('message', { room: currentRoom, msg: encryptedMsg, user: "VIP_ARM" });
        
        appendMessage({ msg: input.value, user: "أنت" }, 'sent');
        input.value = "";
    }

    socket.on('message', (data) => {
        if (data.user !== "VIP_ARM") {
            try {
                const decryptedBytes = CryptoJS.AES.decrypt(data.msg, SECRET_KEY);
                const originalMsg = decryptedBytes.toString(CryptoJS.enc.Utf8);
                if (originalMsg) {
                    appendMessage({ msg: originalMsg, user: "الطرف الآخر" }, 'received');
                }
            } catch (e) { console.error("Decryption Error"); }
        }
    });

    function appendMessage(data, type) {
        const container = document.getElementById('message-container');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `<strong>${data.user}</strong> <div>${data.msg}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function showInvite() {
        const modal = document.getElementById('inviteModal');
        const link = window.location.origin + window.location.pathname + "?room=" + currentRoom;
        document.getElementById('inviteLink').value = link;
        modal.style.display = 'block';
    }

    function closeInvite() { document.getElementById('inviteModal').style.display = 'none'; }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById("inviteLink").value);
        alert("تم نسخ رابط النفق!");
    }

    function logSystem(m) {
        const container = document.getElementById('message-container');
        container.innerHTML += `<div style="text-align:center; font-size:11px; color:var(--accent); margin: 15px 0; font-family:'Fira Code'; opacity:0.6;">> ${m}</div>`;
    }

    // التعامل مع الصور
    document.getElementById('fileInput').addEventListener('change', function(e) {
        if (this.files && this.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const imgTag = `<img src="${e.target.result}" style="max-width:100%; border-radius:12px; margin-top:5px;">`;
                socket.emit('message', { room: currentRoom, msg: CryptoJS.AES.encrypt(imgTag, SECRET_KEY).toString(), user: "VIP_ARM" });
                appendMessage({ msg: imgTag, user: "أنت" }, 'sent');
            };
            reader.readAsDataURL(this.files[0]);
        }
    });

    function toggleSidebar() {
        const s = document.getElementById('sidebar');
        s.style.width = (s.style.width === '0px' || s.style.width === '') ? '280px' : '0px';
    }

    function clearMessages() {
        if(confirm("تصفير سجل المحادثة؟")) document.getElementById('message-container').innerHTML = "";
    }

    // تأثير المصفوفة الهادئ
    function initMatrix() {
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "01"; const fontSize = 12;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(10, 15, 26, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00f2ff"; ctx.font = fontSize + "px monospace";
            for(let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 70);
    }

    function simulateStats() {
        setInterval(() => {
            document.getElementById('cpu-val').innerText = (Math.random() * 3 + 1).toFixed(1) + "%";
            document.getElementById('ram-val').innerText = (Math.random() * 0.1 + 1.2).toFixed(2) + "GB";
        }, 3000);
    }

    window.onload = () => { initMatrix(); simulateStats(); };
</script>
</body>
</html>
